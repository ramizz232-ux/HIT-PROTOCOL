a), non dalla flessione delle anche. Porta i gomiti verso le ginocchia curvando progressivamente la colonna dall'alto verso il basso. Pausa di 1s in massima contrazione. Anche ferme, non spingerle indietro per aiutarti.",techniqueMeta:{type:"target",toFailure:!0}},{id:"a8",name:"Sollevamento bacino/gambe su panca",role:"Retto addominale \u2014 porzione inferiore",equipment:"Panca",seriesCount:1,repsRange:"10-12",rom:"Flettere e staccare il bacino",cadence:"3-1-3-0",percentageText:"Corpo libero / Zavorra",percentageValue:100,tutEstimated:"~70-84s",techniqueNote:"Sdraiato sulla panca, gambe tese o con leggera flessione del ginocchio. Solleva le gambe fino a portarle verticali, poi continua sollevando il bacino da terra in un piccolo arrotolamento pelvico verso l'alto. \xC8 questo distacco del bacino dalla panca \u2014 non la sola elevazione delle gambe \u2014 che recluta davvero il retto addominale inferiore, invece di scaricare il lavoro sui flessori dell'anca. Discesa controllata di 3s, senza mai appoggiare i talloni tra una rep e l'altra.",techniqueMeta:{type:"target",toFailure:!0}},{id:"a9",name:"Side crunch su panca declinata con disco",role:"Obliqui",equipment:"Panca",seriesCount:1,repsRange:"10-12 per lato",rom:"Flessione laterale controllata dal busto",cadence:"3-1-3-0",percentageText:"100% CT",percentageValue:100,tutEstimated:"~70-84s",techniqueNote:"Sdraiato di fianco sulla panca declinata, piedi fissati, disco tenuto al petto: il busto scende oltre il bordo e risale in flessione laterale. Isola l'obliquo con un ROM ampio e un sovraccarico progressivo tramite il disco. Un lato per volta fino al cedimento, poi cambia lato.",techniqueMeta:{type:"target",toFailure:!0}}]},{id:"B",name:"Workout B",subtitle:"Gambe",description:"Sessione pi\xF9 impegnativa: 1 giant set esteso a pi\xF9 esercizi, senza recupero tra le stazioni (cambio macchina in meno di 15-20s), con intensificazione Zone Training (parziali) sui polpacci per massimizzare lo stimolo senza aggiungere s stensione completa, senza bloccare il gomito. Addome contratto per evitare di inarcare la lombare. Apre la superserie di pre-esaurimento inverso con le Alzate laterali: al cedimento, passa SUBITO al prossimo esercizio senza recupero.",techniqueMeta:{type:"target",toFailure:!0,superset:{withId:"c2",role:"first",label:"Superserie di pre-esaurimento inverso"}}},{id:"c2",name:"Alzate laterali",role:"Target Set \u2014 fascio laterale (Ibrido HD/ZT)",equipment:"Manubri",seriesCount:1,repsRange:"8 + parziali + isometria",rom:"Completo poi parziale",cadence:"3-1-3-1",percentageText:"100% CT specifico",percentageValue:100,tutEstimated:"~64s + parziali + isometria",techniqueNote:"Superserie di pre-esaurimento inverso: eseguita subito dopo il lento, senza pausa. Gomiti con leggera flessione fissa (10-15\xB0): \xE8 il gomito che guida il sollevamento, non la mano. Solleva lateralmente fino a portare i gomiti circa all'altezza delle spalle. Al cedimento a ROM completo, continua immediatamente con mezze rep parziali nella zona di massima tensione (braccia parallele al pavimento). Sull'ultima ripetizione possibile, blocca il peso in isometria in quella stessa posizione il pi\xF9 a lungo possibile: il picco isometrico terminale chiude lo stimolo su un fascio piccolo che risponde bene al tempo sotto tensione prolungato.",techniqueMeta:{type:"target",toFailure:!0,hybrid:{fullRomLabel:"Rep a ROM completo",partialLabel:"Mezze rep parziali (braccia parallele)",partialRange:"4-6"},terminalIsometric:!0,superset:{withId:"c1",role:"second",label:"Superserie di pre-esaurimento inverso"}}},{id:"c3",name:"Alzate posteriori su panca inclinata (petto appoggiato)",role:"Target Set \u2014 fascio posteriore (Ibrido HD/ZT)",equipment:"Manubri",seriesCount:1,repsRange:"10-12 + 6 parziali + isometria",rom:"Completo poi parziale",cadence:"3-1-3-1",percentageText:"100% CT specifico",percentageValue:100,tutEstimated:"~80-96s + parziali + isometria",techniqueNote:"Esercizio dedicato, eseguito singolarment nti/alto fino a quasi distendere il gomito. Questa angolazione mette in forte stiramento il capo lungo del tricipite, che origina dalla scapola (anello debole che il Pushdown non raggiunge \u2014 Muscle Law sull'importanza di isolare l'anello debole della catena cinetica). Pausa di 1s in massimo stiramento.",techniqueMeta:{type:"preattivazione",toFailure:!1}},{id:"c6",name:"Panca piana a presa stretta al Multipower",role:"Target Set \u2014 tutte e tre le teste tricipiti",equipment:"Multipower",seriesCount:1,repsRange:"8 + 4 + max",rom:"Completo, gomiti stretti ai fianchi",cadence:"4-0-4-0",percentageText:"100% \u2192 75-80% \u2192 55-65% CT",percentageValue:100,tutEstimated:"~64s + stripping",techniqueNote:"Impugnatura poco pi\xF9 stretta della larghezza spalle (25-30cm tra le mani). I gomiti scivolano vicino ai fianchi in discesa (angolo gomito-busto di circa 30-40\xB0) anzich\xE9 aprirsi verso l'esterno \u2014 \xE8 questo che sposta il lavoro dal pettorale al tricipite. Discesa fino a sfiorare lo sterno, risalita senza bloccare i gomiti. Stripping (doppio drop set): cedimento a 100%, scala al 75-80%, cedi, scala al 55-65%, cedi.",techniqueMeta:{type:"target",toFailure:!0,stripping:[{pct:75,label:"Drop 1"},{pct:55,label:"Drop 2"}]}},{id:"c7",name:"Chest Press a presa stretta",role:"Rifinitura/chiusura tricipiti",equipment:"Macchina",seriesCount:1,repsRange:"max",rom:"Completo",cadence:"3-0-3-0",percentageText:"35-45% CT",percentageValue:40,tutEstimated:"Variabile",techniqueNote:"Stessa logica della Chest Press usata per il petto, ma con gomiti stretti ai fianchi durante tutta l'esecuzione (angolo gomito-busto di circa 20-30\xB0, molto pi\xF9 chiuso che nella versione petto) per isolare ulteriormente il tricipite. A questo punto il muscolo \xE8 quasi esaurito dalla sequenza precedente: carico contenuto (35-45% CT), ma sufficiente a raggiungere il cedimento in poche rep e chiudere lo stimolo su tutte e tre le teste.",techniqueMeta:{type:"rifinitura",toFailure:!0}},{i lor:"sky",what:"Serie progressive a carico crescente (es. 60% poi 85% del CT), MAI portate a cedimento.",why:"Prepara articolazioni e sistema nervoso prima della Target Set, senza consumare risorse per il vero stimolo.",how:"2 serie, carico crescente, cadenza rispettata ma senza cercare il cedimento. Recupero 45-90s tra le serie."},{key:"preattivazione",title:"Pre-attivazione / Pre-esaurimento",tag:"Isolamento preparatorio",color:"slate",what:"Un esercizio di isolamento eseguito PRIMA del target set, a carico moderato (45-60% CT), senza cedimento.",why:"Pre-affatica selettivamente una porzione del muscolo (es. fibre basse del petto) cos\xEC il target set successivo la coinvolge di pi\xF9.",how:"10-12 rep controllate, fermarsi sempre un po' prima del cedimento vero. Nessuna pausa prima del prossimo esercizio se \xE8 un pre-esaurimento diretto."},{key:"target",title:"Target Set (cedimento vero)",tag:"Il vero stimolo",color:"red",what:"L'UNICA serie realmente allenante per gruppo muscolare, portata al vero cedimento concentrico: l'ultima ripetizione deve essere impossibile da completare in forma corretta.",why:"\xC8 il principio cardine del metodo: un volume minimo ma un'intensit\xE0 massima genera lo stimolo ipertrofico, evitando il sovrallenamento.",how:"Rispetta la cadenza fino all'ultima rep. Non fermarti prima per timore: il cedimento tecnico \xE8 l'obiettivo, non un incidente."},{key:"stripping",title:"Stripping (Drop Set)",tag:"Estensione del cedimento",color:"orange",what:"Dopo il cedimento al 100% del CT, si riduce il carico del 20-25% e si continua SENZA RECUPERO fino a un nuovo cedimento, ripetendo 1-2 volte.",why:"Estende la serie oltre il primo cedimento, reclutando ulteriori unit\xE0 motorie quando le prime sono gi\xE0 esaurite.",how:"Zero secondi di recupero tra un'onda e l'altra \u2014 solo il tempo di scalare il peso. Il carico continua a scendere, non risalire."},{key:"hybrid",title:"Ibrido HD/ZT (parziali in zona)",tag:"Heavy Duty + Zone Training",color:"purple",what:"Dopo il cedimento a ROM completo (stile Heavy Duty), si continua IMMEDIATAMENTE con ripetizioni parziali 'a pistone' in una porzione ridotta del movimento (stile Zone Training di Brian Johnston).",why:"La fase HD recluta le fibre rapide con tensione meccanica; la fase ZT le satura di sangue (ischemia locale), massimizzando la sintesi proteica in un'unica serie.",how:"Cedimento vero a ROM completo, poi senza pausa alcuna mezze ripetizioni continue nella zona di massimo accorciamento (o stiramento, a seconda dell'esercizio) fino a cedimento assoluto."},{key:"terminalIsometric",title:"Isometria Terminale",tag:"Picco isometrico",color:"indigo",what:"Al cedimento concentrico, invece di terminare la serie, si mantiene il carico fermo in massima contrazione (es. curl a 90\xB0) per il massimo tempo possibile.",why:"Massimizza il danno strutturale controllato sulle fibre gi\xE0 sotto tensione, oltre il limite del movimento dinamico.",how:"Appena non riesci pi\xF9 a completare la fase concentrica, blocca il peso nella posizione raggiunta e resisti il pi\xF9 a lungo possibile prima di cedere."},{key:"superset",title:"Superserie di Pre-esaurimento Inverso",tag:"Due esercizi, zero pausa",color:"pink",what:"Due target set consecutivi sullo stesso gruppo muscolare, eseguiti senza alcun recupero tra loro (es. Lento al Multipower \u2192 Alzate Laterali).",why:"Il movimento multiarticolare pesante viene prima; l'isolamento subito dopo colpisce il fascio gi\xE0 parzialmente affaticato da un'angolazione diversa.",how:"Appena raggiunto il cedimento nel primo esercizio, passa immediatamente al secondo \u2014 zero secondi, nessuna pausa per recuperare fiato."},{key:"giantSet",title:"Giant Set (solo Workout B \u2014 Gambe)",tag:"Pi\xF9 esercizi, un'unica ondata",color:"emerald",what:"Sette esercizi per le gambe eseguiti in sequenza, con 45-60s di recupero tra una stazione e l'altra, dal multiarticolare pesante fino ai piccoli isolamenti.",why:"Non \xE8 una serie di superserie separate: \xE8 un'unica ondata di fatica progressiva su tutta la muscolatura di coscia e anca. Il breve recupero tra le stazioni permette di cambiare macchina e ricomporsi senza raffreddare completamente il sistema.",how:"Prepara mentalmente il percorso tra le 7 macchine prima di iniziare. Riscaldamento generale + ramping allo squat obbligatori prima di partire. Richiede almeno 3 giorni pieni di recupero dopo."},{key:"rifinitura",title:"Rifinitura / Chiusura",tag:"Cedimento a carico ridotto",color:"gray",what:"Un ultimo esercizio a carico contenuto (35-45% CT), eseguito quando il muscolo \xE8 gi\xE0 quasi esausto da stripping o pre-attivazioni precedenti.",why:"Il muscolo target \xE8 gi\xE0 praticamente esaurito: non serve un carico alto per raggiungere il cedimento e 'chiudere' completamente lo stimolo.",how:"Esegui a cedimento con il carico ridotto indicato, senza cercare di alzare il peso \u2014 la fatica accumulata fa il lavoro."},{key:"copertura",title:"Copertura Muscolare (zone)",tag:"Allena tutte le aree del muscolo",color:"amber",what:"Molti muscoli hanno pi\xF9 aree/fibre con orientamenti diversi (es. il petto ha porzione alta, media, bassa; le spalle anteriore, laterale, posteriore). Ogni esercizio o variante enfatizza una zona specifica.",why:"Allenare sempre la stessa zona lascia le altre sotto-stimolate e crea sviluppo squilibrato. L'obiettivo \xE8 che, tra gli esercizi di un workout, ogni zona del muscolo riceva stimolo \u2014 senza per\xF2 ridondare (due esercizi sulla stessa zona sono uno sprecato).",how:"Il pannello Copertura mostra quali zone sono coperte (\u2713 verde) e quali no (\u25CB ambra) in base alle varianti attive. Se manca una zona, tocca 'Applica' per impostare la variante che la copre. Nota: se un gruppo ha meno esercizi che zone (es. 1 solo esercizio bicipiti), le zone si coprono ruotando la variante tra un ciclo e l'altro, non nella stessa seduta."},{key:"livello",title:"Livello \u2014 Intermedio / Avanzato",tag:"A chi \xE8 adatto",color:"gray",what:"Questo protocollo richiede la capacit\xE0 di portare una serie al vero cedimento muscolare con tecnica corretta, e di gestire tecniche di intensit\xE0 (stripping, Zone Training, isometrie).",why:"Il HIT vive sul cedimento reale: un principiante spesso non sa ancora spingersi fin l\xEC in sicurezza, n\xE9 ha la connessione mente-muscolo per farlo bene. Serve una base di almeno 6-12 mesi di allenamento strutturato.",how:"Se ti alleni da tempo e sai cosa significa 'non riuscire a completare un'altra ripetizione in forma corretta', sei nel target. Altrimenti, costruisci prima una base con un approccio pi\xF9 classico."},{key:"frequenza",title:"Frequenza Flessibile",tag:"Non a giorni fissi",color:"blue",what:"Non ti alleni a giorni fissi del calendario (es. 'luned\xEC petto'), ma in base al recupero effettivo di ogni gruppo muscolare.",why:"Il muscolo cresce durante il riposo, non durante l'allenamento. Riallenare un gruppo prima che sia recuperato interrompe la supercompensazione e porta al sovrallenamento. Persone diverse (e momenti diversi) recuperano a velocit\xE0 diverse.",how:"Il segnale oggettivo \xE8 il carico: se il peso che sollevavi non scende, sei recuperato e puoi riallenare quel gruppo; se scende o ti senti svuotato, aspetta un giorno in pi\xF9. Ascolta anche sonno, energia e articolazioni (vedi il check Prontezza)."},{key:"recupero",title:"Recupero Post-Seduta",tag:"Per lo stesso gruppo muscolare",color:"green",what:"I giorni indicati (es. 2-3 giorni) sono il tempo minimo prima di riallenare LO STESSO gruppo muscolare \u2014 cio\xE8 prima di rifare QUEL workout, non un altro.",why:"Ogni workout colpisce muscoli diversi (A: petto/schiena/addome, B: gambe, C: spalle/braccia). Mentre il gruppo di A recupera, puoi allenare B e C: sono muscoli diversi, non c'\xE8 conflitto.",how:"Puoi fare A il giorno 1, B il giorno 2, C il giorno 3, e poi ripartire da A quando \xE8 passato il suo recupero. Il recupero conta PER MUSCOLO, non blocca il calendario. Unica eccezione: dopo le gambe (specie col doppio giro) servono pi\xF9 giorni prima di rifare LE GAMBE, ma puoi comunque allenare la parte alta nel frattempo."},{key:"durata",title:"Durata Stimata",tag:"Tempo indicativo della seduta",color:"gray",what:"Una stima del tempo totale della seduta, calcolata dai tempi sotto tensione (TUT) di ogni esercizio + i recuperi realistici + riscaldamento e ramping.",why:"Serve a pianificare: il HIT \xE8 nato per essere efficiente. Se una seduta dura molto pi\xF9 del previsto, probabilmente stai recuperando troppo tra gli esercizi o aggiungendo volume non previsto.",how:"\xC8 un intervallo (min-max) perch\xE9 il ritmo di esecuzione e i transiti variano. Il tempo-macchina pu\xF2 essere breve anche quando la fatica \xE8 altissima (es. il giant set gambe): durata corta non significa seduta facile."},{key:"ct",title:"CT \u2014 Carico Target",tag:"Non \xE8 il tuo 1RM",color:"red",what:"Il peso pi\xF9 pesante con cui raggiungi il cedimento entro il range di ripetizioni previsto (es. 8), rispettando la cadenza lenta indicata.",why:"Il 100% della scheda NON \xE8 il massimale a 1 ripetizione (1RM). Il vero 1RM non va mai testato in questo protocollo: la cadenza lenta cambia la curva di forza e un test massimale comporta un rischio articolare sproporzionato.",how:"Si trova per approssimazioni successive nelle prime 1-2 sedute per esercizio: se il cedimento arriva oltre il range, aumenta il carico del 10-15% alla seduta dopo; se arriva prima, riducilo del 10-15%. Usa il tab 'Trova CT'."},{key:"rom",title:"ROM \u2014 Range of Movement",tag:"Escursione articolare",color:"sky",what:"L'ampiezza del movimento eseguito nell'esercizio. 'Completo' significa dalla massima estensione alla massima contrazione muscolare.",why:"Il ROM completo \xE8 richiesto nella fase di ramping/pre-attivazione per stimolare l'intera fibra muscolare. Le riduzioni di ROM (parziali, Zone Training) sono tecniche di intensificazione, applicate solo DOPO il cedimento a ROM completo \u2014 mai al posto di esso.",how:"Rispetta sempre il ROM indicato per l'esercizio. Se non riesci a completarlo con forma corretta, il carico \xE8 troppo alto."},{key:"tut",title:"TUT \u2014 Time Under Tension",tag:"Tempo sotto tensione",color:"amber",what:"Il tempo totale in cui il muscolo resta sotto carico durante una serie: cadenza (secondi per ripetizione) \xD7 numero di ripetizioni.",why:"Le target set dei grandi gruppi muscolari dovrebbero ricadere nella fascia di TUT intermedio (30-70 secondi), la finestra ottimale per l'ipertrofia miofibrillare. Dove il TUT supera i 70s per scelta (polpacci, curl con isometria), \xE8 intenzionale.",how:"Se il TUT stimato \xE8 molto pi\xF9 corto del previsto, probabilmente stai muovendo il peso pi\xF9 veloce della cadenza richiesta."},{key:"cadenza",title:"Cadenza (4 numeri)",tag:"Eccentrica\u2013Iso.bassa\u2013Concentrica\u2013Iso.alta",color:"indigo",what:"Quattro numeri in secondi, in quest'ordine: Eccentrica (discesa) \u2013 Isometria inferiore (pausa in massimo stiramento) \u2013 Concentrica (risalita) \u2013 Isometria superiore (pausa in massima contrazione). Es. 4-0-4-0 = 4s discesa, 0s pausa bassa, 4s salita, 0s pausa alta.",why:"La velocit\xE0 di esecuzione determina lo stimolo meccanico: rallentare elimina l'inerzia e obbliga le fibre contrattili a farsi carico dell'intero movimento, anzich\xE9 scaricare il lavoro su tendini e legamenti.",how:"Usa il Metronomo Cadenza nella scheda per rispettare esattamente i tempi prescritti \u2014 \xE8 la variabile pi\xF9 spesso ignorata e pi\xF9 determinante del protocollo."},{key:"cedimento",title:"Cedimento (vero)",tag:"L'obiettivo di ogni Target Set",color:"red",what:"Il punto in cui, rispettando forma e cadenza corrette, \xE8 fisicamente impossibile completare un'altra ripetizione.",why:"\xC8 l'intensit\xE0 estrema del cedimento concentrico \u2014 non il volume di serie \u2014 a stimolare l'ipertrofia in questo metodo. Fermarsi prima per timore vanifica la t Fai rigorosamente riferimento alle regole del manuale:
1. CT (Carico Target) NON \xE8 il massimale a 1 ripetizione (1RM). \xC8 il peso pi\xF9 pesante con cui l'utente raggiunge il cedimento entro il range di ripetizioni previsto (es. 8 ripetizioni), rispettando la cadenza lenta indicata. Il vero 1RM non va mai testato!

3. Volume minimo: ogni gruppo muscolare riceve UNA SOLA serie realmente allenante (Target Set) portata al cedimento, preceduta da ramping e pre-attivazioni. Se l'utente fa pi\xF9 di una serie allenante, sta sbagliando.
4. Struttura dei Workout: A) Petto, Schiena, Addome \u2014 3 target set. B) Gambe \u2014 1 giant set esteso a pi\xF9 esercizi con 45-60s di recupero tra le stazioni, devastante, richiede almeno 3 giorni pieni di riposo. C) Spalle, Bicipiti, Tricipiti \u2014 5 target set.
