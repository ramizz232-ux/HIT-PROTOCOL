`)}var Af=[{id:"A",name:"Workout A",subtitle:"Petto, Schiena e Addome",description:"Catena cinetica superiore antagonista + core. 3 target set totali (petto, schiena + addome).",exercises:[{id:"a1",name:"Croci ai cavi (pulley medie, incrocio orizzontale)",role:"Pre-attivazione (fibre sterno-costali centrali)",equipment:"Cavi",seriesCount:1,repsRange:"10-12",rom:"Completo, massimo stiramento in apertura",cadence:"3-1-3-0",percentageText:"60-70% CT",percentageValue:70,tutEstimated:"~70-84s",techniqueNote:"Pulley posizionate all'altezza delle spalle, cos\xEC il cavo si muove su una traiettoria orizzontale: questa direzione di trazione pre-affatica la massa centrale del pettorale (fasci sterno-costali), che \xE8 il motore principale sia della panca inclinata sia della piana \u2014 allineando il pre-stancaggio all'esercizio che segue. Gomito con una leggera flessione fissa per tutto il movimento (10-20\xB0): non estenderlo n\xE9 flettelo ulteriormente, altrimenti il lavoro si sposta sul tricipite. Porta le mani a incrociarsi davanti allo sterno, enfatizzando la contrazione di picco. Pausa di 1s in massima contrazione. Busto lievemente inclinato in avanti senza inarcare la lombare. Intensit\xE0 60-70% (pi\xF9 alta della classica pre-attivazione al 50%, per reclutare pi\xF9 fibre) ma senza raggiungere il cedimento: serve a pre-affaticare il petto senza intaccare tricipiti/deltoide anteriore.",techniqueMeta:{type:"preattivazione",toFailure:!1}},{id:"a2",name:"Panca inclinata al Multipower",role:"Ramping (fibre alte)",equipment:"Multipower",seriesCount:2,repsRange:"8-10",rom:"Completo",cadence:"3-0-3-0",percentageText:"60% \u2192 85% CT",percentageValue:75,tutEstimated:"Non a cedimento",techniqueNote:"Inclina la panca tra 30\xB0 e 45\xB0: oltre i 45\xB0 il lavoro si sposta eccessivamente sui deltoidi anteriori a scapito del petto. Il Multipower guida la traiettoria su un binario verticale fisso, eliminando la necessit\xE0 di stabilizzare lateralmente il carico \u2014 cos\xEC puoi concentrare l'energia nervosa sulla tensione muscolare pura invece che sull'equilibrio. Scapole retratte e leggermente depresse contro la panca per tutta la serie. Discesa fino a sfiorare la parte alta del petto, gomiti a circa 45-60\xB0 dal busto (non aperti a 90\xB0, per proteggere la capsula anteriore della spalla). Attivazione neurale, serie progressive (60% poi 85%), mai a cedimento.",techniqueMeta:{type:"ramping",toFailure:!1}},{id:"a3",name:"Chest Press (macchina)",role:"Target Set (fibre medie, massa generale)",equipment:"Macchina",seriesCount:1,repsRange:"8 + 4 + max",rom:"Completo, no lockout in alto",cadence:"4-0-4-0",percentageText:"100% \u2192 75% \u2192 55% CT",percentageValue:100,tutEstimated:"~64s + stripping",techniqueNote:"Regola il sedile in modo che le maniglie siano all'altezza dello sterno, con le braccia che formano un angolo di circa 90\xB0 tra avambraccio e busto nella posizione di partenza. Gomiti a circa 45-60\xB0 rispetto al busto (non completamente aperti a 90\xB0, altrimenti sovraccarichi la spalla). Discesa di 4s fino a massimo stiramento \u2014 i gomiti possono superare leggermente la linea del busto, ma mai oltre il punto in cui senti tensione o disagio nella parte anteriore della spalla. Nessuna pausa in basso (il petto non ha bisogno dello stacco isometrico che invece serve al dorso \u2014 il rischio di sovraccarico sulla capsula anteriore supera qui il beneficio). Risalita di 4s senza bloccare i gomiti in estensione completa. Schiena e testa sempre a contatto con lo schienale. Stripping (triplo drop set): cedimento a 100% CT, scala del 25%, cedi di nuovo, scala un altro 20%, cedi del tutto.",techniqueMeta:{type:"target",toFailure:!0,stripping:[{pct:75,label:"Drop 1"},{pct:55,label:"Drop 2"}]}},{id:"a4",name:"Lat Machine avanti (presa larga)",role:"Pre-esaurimento/isolamento (ampiezza)",equipment:"Macchina",seriesCount:1,repsRange:"10-12",rom:"Completo, massimo stiramento sopra la testa",cadence:"4-2-4-1",percentageText:"60-70% CT",percentageValue:70,tutEstimated:"~110-132s",techniqueNote:"Presa prona, larghezza appena oltre le spalle (circa 15-20 cm oltre la larghezza spalle per parte) \u2014 una presa eccessivamente larga riduce il ROM utile e aumenta lo stress sulla cuffia dei rotatori. Busto verticale o inclinato all'indietro di massimo 10-15\xB0 (non di pi\xF9, altrimenti diventa un rematore mascherato). La fase eccentrica di 4s \xE8 cruciale: lascia risalire la barra controllata fino al massimo stiramento, braccia quasi estese sopra la testa (gomiti a circa 170\xB0, non bloccati), poi pausa di 2s per eliminare il rimbalzo elastico. Nella trazione, il movimento inizia dalla retrazione della scapola (verso la tasca posteriore opposta) prima ancora di flettere il gomito \u2014 sposta il lavoro dal bicipite al dorsale. I gomiti scendono lungo una traiettoria che li porta a circa 45\xB0 rispetto al busto in basso, non stretti contro i fianchi. Pausa di 1s in massima contrazione, petto leggermente proteso in avanti. Enfasi sullo stiramento, no cedimento assoluto.",techniqueMeta:{type:"preattivazione",toFailure:!1}},{id:"a5",name:"Trazioni assistite o libere",role:"Ramping (ampiezza)",equipment:"Sbarra",seriesCount:2,repsRange:"6-8",rom:"Completo",cadence:"3-0-3-0",percentageText:"Corpo Libero / Assistenza",percentageValue:100,tutEstimated:"Non a cedimento",techniqueNote:"Presa prona, larghezza spalle o poco oltre (mani a circa 15 cm oltre le spalle per lato), braccia quasi parallele tra loro (non troppo larghe). Se usi la macchina assistita, imposta il contrappeso al minimo necessario per completare 6-8 rep pulite \u2014 l'obiettivo non \xE8 il cedimento (\xE8 ramping), ma la qualit\xE0: parti da braccia completamente estese (dead hang, gomiti a circa 170\xB0) e sali fino al mento sopra la barra, senza slanci del bacino o delle gambe. Scapole che iniziano il movimento retraendosi prima che il gomito si fletta, come nella lat machine. Gomiti che scendono verso il basso e leggermente in avanti (circa 30-45\xB0 rispetto al busto), non tirati indietro come in un rematore. Evita di far oscillare il corpo: movimento verticale e controllato. Gradino esteso opzionale: se usi la macchina assistita, riduci l'assistenza; se fai trazioni libere (a corpo libero o gi\xE0 con sovraccarico), aggiungi invece un po' di peso extra \u2014 le due modalit\xE0 vanno nella direzione opposta, e lo schema qui sotto si adatta automaticamente in base alla variante che hai scelto.",techniqueMeta:{type:"ramping",toFailure:!1}},{id:"a6",name:"Rematore (qualsiasi variante)",role:"Target Set Ibrido HD/ZT (spessore)",equipment:"Macchina",seriesCount:1,repsRange:"8 + 4-6 parziali",rom:"Completo poi parziale",cadence:"4-1-4-1",percentageText:"100% CT",percentageValue:100,tutEstimated:"~80s + parziali",techniqueNote:"Qualsiasi variante tu scelga (bilanciere, macchina, cavo basso), assicurati un ROM completo: dai gomiti tesi con scapole protratte (massimo stiramento) fino alla massima retrazione scapolare a fine trazione. Busto stabile, inclinazione fissa per tutta la serie (non usare slancio lombare). Le 8 rep a ROM completo vanno fino al vero cedimento. Subito dopo, senza pausa, continua a muovere il carico solo nella porzione finale del movimento \u2014 dalla met\xE0 del ROM fino alla massima contrazione, con piccole rep continue 'a pistone' \u2014 per altre 4-6 mezze rep: \xE8 la componente Zone Training che genera ischemia locale sul dorso gi\xE0 affaticato dalla tensione meccanica della fase HD.",techniqueMeta:{type:"target",toFailure:!0,hybrid:{fullRomLabel:"Rep a ROM completo",partialLabel:"Mezze rep parziali (zona di accorciamento)",partialRange:"4-6"}}},{id:"a7",name:"Crunch al cavo alto (in ginocchio)",role:"Retto addominale \u2014 porzione superiore",equipment:"Cavi",seriesCount:1,repsRange:"10-12",rom:"Completo, curvando la colonna",cadence:"3-1-3-0",percentageText:"100% CT",percentageValue:100,tutEstimated:"~70-84s",techniqueNote:"Inginocchiati di fronte alla stazione cavi alta, ginocchia a circa 90\xB0 sotto i fianchi, corda dietro la nuca, gomiti che puntano verso il pavimento vicino alle tempie (angolo gomito-busto di circa 30-40\xB0). Il movimento parte esclusivamente dalla flessione del busto (arrotolamento della colonna), non dalla flessione delle anche: le braccia restano fisse rispetto alla testa, sono solo un tramite per il carico. Porta i gomiti verso le ginocchia curvando progressivamente la colonna dall'alto verso il basso (il busto arriva a formare un angolo di circa 45-60\xB0 rispetto alla verticale di partenza), non a blocco unico. Pausa di 1s in massima contrazione con l'ombelico che si avvicina alla colonna. Anche ferme, non spingerle indietro per aiutarti.",techniqueMeta:{type:"target",toFailure:!0}},{id:"a8",name:"Sollevamento bacino/gambe su panca",role:"Retto addominale \u2014 porzione inferiore",equipment:"Panca",seriesCount:1,repsRange:"10-12",rom:"Flettere e staccare il bacino",cadence:"3-1-3-0",percentageText:"Corpo libero / Zavorra",percentageValue:100,tutEstimated:"~70-84s",techniqueNote:"Sdraiato sulla panca (piana o leggermente declinata di 10-15\xB0), gambe tese o con leggera flessione del ginocchio (circa 10-20\xB0). Solleva le gambe fino a portarle verticali (90\xB0 rispetto al busto), poi il movimento non finisce l\xEC: continua sollevando il bacino da terra in un piccolo 'arrotolamento' pelvico verso l'alto, le gambe che superano leggermente la verticale (verso i 100-110\xB0). \xC8 questo distacco del bacino dalla panca \u2014 non la sola elevazione delle gambe \u2014 che recluta davvero il retto addominale inferiore, invece di scaricare il lavoro sui flessori dell'anca. Discesa controllata di 3s, senza mai appoggiare i talloni tra una rep e l'altra: tensione continua sull'addome per tutta la serie.",techniqueMeta:{type:"target",toFailure:!0}},{id:"a9",name:"Torsioni al cavo (woodchopper) o crunch laterale",role:"Obliqui",equipment:"Cavi",seriesCount:1,repsRange:"10-12 per lato",rom:"Rotazione controllata dal busto",cadence:"3-1-3-0",percentageText:"100% CT",percentageValue:100,tutEstimated:"~70-84s",techniqueNote:"In piedi, di fianco alla stazione cavi, ginocchia leggermente flesse (circa 10-15\xB0) per stabilit\xE0, impugna la maniglia con entrambe le mani e ruota il busto trascinando il peso da un lato all'altro seguendo una traiettoria diagonale (dall'alto di un lato al basso del lato opposto, un angolo totale di rotazione del busto di circa 60-90\xB0). Punto cruciale: i fianchi restano il pi\xF9 fermi possibile \u2014 la rotazione avviene alla gabbia toracica e alla colonna dorsale, non alle anche (se ruoti anche il bacino, stai usando glutei e femorali, non gli obliqui). Braccia quasi tese (gomiti a circa 160-170\xB0) che seguono il busto senza tirare autonomamente. Un lato per volta fino al cedimento, poi cambia lato.",techniqueMeta:{type:"target",toFailure:!0}}]},{id:"B",name:"Workout B",subtitle:"Gambe",description:"Sessione pi\xF9 impegnativa: 1 giant set esteso a 7 stazioni con 45-60s di recupero tra le stazioni, con intensificazione Zone Training (parziali) su quadricipiti, femorali e glutei per massimizzare lo stimolo senza aggiungere serie.",exercises:[{id:"b1",name:"1. Squat assistito (guidato)",role:"Apertura Giant Set \u2014 quadricipite, glutei",equipment:"Multipower",seriesCount:1,repsRange:"6",rom:"Fino a coscia parallela o poco sotto",cadence:"3-1-3-0",percentageText:"100% CT a fresco",percentageValue:100,tutEstimated:"~42s",techniqueNote:"Usa la macchina guidata disponibile (Smith Machine, hack squat o pressa verticale) per il cedimento in sicurezza senza spotter. Piedi larghezza spalle, leggermente extraruotati (10-15\xB0). Scendi fino a coscia parallela o poco sotto, controllando i 3s eccentrici \u2014 le ginocchia seguono la direzione delle punte dei piedi, senza collassare verso l'interno. Isometria di 1s nel punto pi\xF9 basso per eliminare il rimbalzo elastico. Risali senza bloccare le ginocchia in estensione completa. Colonna lombare neutra per tutta la serie, sguardo avanti. Il pi\xF9 pesante e complesso: partire rigorosamente a fresco dopo riscaldamento.",techniqueMeta:{type:"target",toFailure:!0,giantSet:{position:1,of:7}}},{id:"b2",name:"2. Leg Press",role:"Prosecuzione multiarticolare",equipment:"Macchina",seriesCount:1,repsRange:"8",rom:"Completo, no lockout ginocchia",cadence:"3-1-3-0",percentageText:"~75-85% del CT",percentageValue:80,tutEstimated:"~56s",techniqueNote:"Dopo lo squat, con 45-60s di recupero, gi\xE0 parzialmente affaticato: carico relativo pi\xF9 basso ma stimolo massimale grazie alla pre-fatica. Piedi centrali sulla pedana, larghezza spalle. ROM completo: scendi fino a un angolo del ginocchio di circa 90\xB0 o poco oltre, senza che il bacino si sollevi dallo schienale (segnale di aver superato il ROM sicuro), risali senza mai bloccare le ginocchia in alto. Schiena e bacino sempre a contatto con lo schienale.",techniqueMeta:{type:"target",toFailure:!0,giantSet:{position:2,of:7}}},{id:"b3",name:"3. Leg Extension",role:"Isolamento quadricipite (Zone Training)",equipment:"Macchina",seriesCount:1,repsRange:"10 + 6 parziali",rom:"Completo poi parziale",cadence:"3-0-3-0",percentageText:"~65-75% del CT",percentageValue:70,tutEstimated:"~60s + parziali",techniqueNote:"Il quadricipite \xE8 gi\xE0 molto stanco: questo monoarticolare ripulisce le ultime riserve, isolando il muscolo target senza il contributo di glutei e femorali gi\xE0 usati negli esercizi precedenti. Schienale regolato in modo che il ginocchio sia allineato con l'asse di rotazione della macchina, angolo di partenza del ginocchio a circa 90\xB0 (o poco pi\xF9 flesso). Estendi fino quasi alla distensione completa della gamba (170-175\xB0, senza bloccare l'articolazione). Pausa breve (~1s) in massima estensione per accentuare la contrazione di picco. Al cedimento a ROM completo, senza recupero, esegui 6 rep parziali nella met\xE0 alta del movimento (dai 90\xB0 circa fino alla massima estensione, zona di massima contrazione), ritmo continuo 'a pistone': l'intensificazione Zone Training satura il quadricipite di sangue e completa lo stimolo senza aggiungere una serie.",techniqueMeta:{type:"target",toFailure:!0,giantSet:{position:3,of:7},hybrid:{fullRomLabel:"Rep complete",partialLabel:"Rep parziali (contrazione, 'a pistone')",partialRange:"6"}}},{id:"b4",name:"4. Leg Curl",role:"Isolamento femorali (Zone Training)",equipment:"Macchina",seriesCount:1,repsRange:"10 + 6 parziali",rom:"Completo poi parziale",cadence:"3-0-3-0",percentageText:"~70-80% del CT",percentageValue:75,tutEstimated:"~60s + parziali",techniqueNote:"Lavora l'antagonista (femorali) dopo tre esercizi a dominanza quadricipite \u2014 fondamentale per l'equilibrio articolare del ginocchio e per prevenire squilibri di forza che nel tempo aumentano il rischio di infortunio al legamento crociato anteriore. Bacino ben appoggiato, senza sollevarlo per 'aiutarsi' a fine ripetizione. Parti da gamba quasi distesa (ginocchio a circa 170\xB0) e fletti fino a portare il tallone il pi\xF9 vicino possibile ai glutei (ginocchio a circa 30-40\xB0), breve pausa in massima contrazione. Al cedimento a ROM completo, senza recupero, esegui 6 rep parziali nella met\xE0 di massima contrazione (dai 90\xB0 circa fino a fine corsa, talloni verso i glutei), ritmo continuo 'a pistone': l'intensificazione Zone Training completa lo stimolo sui femorali, muscoli difficili da esaurire, senza aggiungere una serie.",techniqueMeta:{type:"target",toFailure:!0,giantSet:{position:4,of:7},hybrid:{fullRomLabel:"Rep complete",partialLabel:"Rep parziali (contrazione, 'a pistone')",partialRange:"6"}}},{id:"b5",name:"5. Adductor (adduttori)",role:"Isolamento interno coscia",equipment:"Macchina",seriesCount:1,repsRange:"10-12",rom:"Completo, senza slanci",cadence:"3-0-3-0",percentageText:"~70-80% del CT",percentageValue:75,tutEstimated:"~60-72s",techniqueNote:"Muscolatura piccola, gi\xE0 indirettamente affaticata dal lavoro di stabilizzazione svolto negli esercizi precedenti. Schiena ben appoggiata, parti dalla massima apertura consentita dalla macchina (le gambe possono arrivare a un'apertura di 40-45\xB0 rispetto alla linea centrale) fino alla chiusura completa (gambe parallele, vicino a 0\xB0), senza slanci per superare i punti di maggiore resistenza. Movimento lento e controllato in entrambe le direzioni: l'errore pi\xF9 comune \xE8 lasciare che il peso richiami le gambe in apertura senza controllo eccentrico.",techniqueMeta:{type:"target",toFailure:!0,giantSet:{position:5,of:7}}},{id:"b6",name:"6. Abductor (abduttori)",role:"Isolamento esterno coscia/glutei (Zone Training)",equipment:"Macchina",seriesCount:1,repsRange:"10-12 + 6 parziali",rom:"Completo poi parziale",cadence:"3-0-3-0",percentageText:"~70-80% del CT",percentageValue:75,tutEstimated:"~60-72s + parziali",techniqueNote:"Chiude il lavoro sull'anca e sul gluteo medio \u2014 importante per la stabilit\xE0 del bacino e la salute del ginocchio. Schiena ben appoggiata, ROM completo dalla chiusura fino alla massima apertura contro resistenza, senza inclinare il busto per compensare. Per enfatizzare il gluteo, inclina leggermente il busto in avanti (10-15\xB0) durante l'apertura. Al cedimento a ROM completo, senza recupero, esegui 6 rep parziali nella zona di massima apertura (picco di contrazione del gluteo), ritmo 'a pistone': questa intensificazione Zone Training aggiunge stimolo mirato sui glutei senza una serie in pi\xF9.",techniqueMeta:{type:"target",toFailure:!0,giantSet:{position:6,of:7},hybrid:{fullRomLabel:"Rep complete",partialLabel:"Rep parziali (apertura/glutei, 'a pistone')",partialRange:"6"}}},{id:"b7",name:"7. Pressa polpacci",role:"Isolamento polpaccio (Zone Training)",equipment:"Macchina",seriesCount:1,repsRange:"12 + 8 parziali",rom:"Completo poi parziale",cadence:"4-2-4-2",percentageText:"~80-90% del CT",percentageValue:85,tutEstimated:"~144s + parziali",techniqueNote:"Punte dei piedi sul bordo della pedana, talloni liberi di scendere oltre il bordo. 12 rep complete a ROM pieno: massima estensione della caviglia in alto (punta del piede in basso, angolo caviglia di circa 150-160\xB0) e massimo stiramento in basso (tallone il pi\xF9 sotto possibile, caviglia flessa a circa 70-80\xB0), con pausa di 2s in questa posizione \u2014 il polpaccio, ricco di fibre lente, risponde bene a questa pausa prolungata. Al cedimento, senza recupero, 8 rep parziali solo nella porzione inferiore del movimento (dal massimo stiramento fino a met\xE0 corsa), ritmo continuo 'a pistone': questa componente Zone Training finale sfrutta l'ischemia locale su un muscolo notoriamente resistente alla fatica.",techniqueMeta:{type:"target",toFailure:!0,giantSet:{position:7,of:7},hybrid:{fullRomLabel:"Rep complete",partialLabel:"Rep parziali (massimo stiramento, 'a pistone')",partialRange:"8"}}}]},{id:"C",name:"Workout C",subtitle:"Spalle, Bicipiti e Tricipiti",description:"Distretti piccoli e sinergici. 5 target set complessivi (3 spalle in superserie, 1 tricipiti, 1 bicipiti).",exercises:[{id:"c1",name:"Lento al Multipower",role:"Target Set \u2014 fascio anteriore",equipment:"Multipower",seriesCount:1,repsRange:"8",rom:"Completo, non scendere sotto le orecchie",cadence:"4-0-4-0",percentageText:"100% CT",percentageValue:100,tutEstimated:"~64s",techniqueNote:"Spinta sopra la testa guidata sul binario verticale. Gomiti che partono appena sotto il livello delle spalle, ad un angolo di circa 80-90\xB0 rispetto al busto, bilanciere davanti al viso (non dietro la nuca \u2014 inutile rischio per la cuffia dei rotatori). Discesa controllata di 4s fino a quando i gomiti tornano appena sotto le spalle (angolo di circa 70-80\xB0), nessuna pausa in basso. Risalita fino quasi alla estensione completa (gomiti a circa 170\xB0), senza bloccare il gomito. Addome contratto per evitare di inarcare la lombare. L'ultima rep a cedimento deve fermarsi a met\xE0 corsa.",techniqueMeta:{type:"target",toFailure:!0,superset:{withId:"c2",role:"first",label:"Superserie di pre-esaurimento inverso"}}},{id:"c2",name:"Alzate laterali (manubri o cavi)",role:"Target Set \u2014 fascio laterale (Ibrido HD/ZT)",equipment:"Manubri",seriesCount:1,repsRange:"8 + parziali + isometria",rom:"Completo poi parziale",cadence:"3-1-3-1",percentageText:"100% CT specifico",percentageValue:100,tutEstimated:"~64s + parziali + isometria",techniqueNote:"Superserie di pre-esaurimento inverso: eseguita subito dopo il lento, senza pausa. Gomiti con leggera flessione fissa (10-15\xB0) per tutto il movimento \u2014 \xE8 il gomito che guida il sollevamento, non la mano. Solleva lateralmente fino a portare i gomiti circa all'altezza delle spalle (non oltre, o interviene troppo il trapezio). Busto fermo e verticale per tutta la serie: se serve inclinarsi o dare slancio, il carico \xE8 troppo pesante. Al cedimento a ROM completo, continua immediatamente con mezze ripetizioni parziali nella zona di massima tensione (braccia parallele al pavimento) \u2014 \xE8 la porzione dell'arco dove il deltoide laterale lavora con maggior svantaggio meccanico, ideale per l'accumulo metabolico dello Zone Training. Sull'ultima ripetizione possibile, blocca il peso in isometria in quella stessa posizione il pi\xF9 a lungo possibile: il picco isometrico terminale chiude lo stimolo su un fascio piccolo che risponde bene al tempo sotto tensione prolungato.",techniqueMeta:{type:"target",toFailure:!0,hybrid:{fullRomLabel:"Rep a ROM completo",partialLabel:"Mezze rep parziali (braccia parallele)",partialRange:"4-6"},terminalIsometric:!0,superset:{withId:"c1",role:"second",label:"Superserie di pre-esaurimento inverso"}}},{id:"c3",name:"Alzate posteriori / Reverse Fly",role:"Target Set \u2014 fascio posteriore (Ibrido HD/ZT)",equipment:"Cavi",seriesCount:1,repsRange:"10-12 + 6 parziali + isometria",rom:"Completo poi parziale",cadence:"3-1-3-1",percentageText:"100% CT specifico",percentageValue:100,tutEstimated:"~80-96s + parziali + isometria",techniqueNote:"Esercizio dedicato, eseguito singolarmente a fine spalle. Cavi incrociati (maniglia sinistra con mano destra e viceversa, per allungare la traiettoria) o panca inclinata 30\xB0 prona con manubri, aprendo le braccia lateralmente e indietro con leggera flessione del gomito. Pausa di 1s in massima retrazione scapolare per massimizzare il reclutamento del fascio posteriore. Fascio piccolo e spesso sotto-allenato: richiede spesso qualche rep in pi\xF9 (10-12). Al cedimento a ROM completo, senza recupero, esegui 6 rep parziali nella zona di massima apertura/retrazione ('a pistone'): il deltoide posteriore, piccolo e resistente, risponde bene a questa intensificazione Zone Training che ne completa lo stimolo senza aggiungere una serie. Sull'ultima parziale possibile, blocca le braccia in massima retrazione e resisti il pi\xF9 a lungo possibile: il picco isometrico terminale chiude lo stimolo su un fascio che tollera bene il tempo sotto tensione prolungato.",techniqueMeta:{type:"target",toFailure:!0,hybrid:{fullRomLabel:"Rep complete",partialLabel:"Rep parziali (apertura/retrazione, 'a pistone')",partialRange:"6"},terminalIsometric:!0}},{id:"c4",name:"Pushdown al cavo alto (presa stretta/neutra)",role:"Pre-attivazione \u2014 capo laterale tricipite",equipment:"Cavi",seriesCount:1,repsRange:"10-12",rom:"Completo, gomiti fissi ai fianchi",cadence:"3-0-3-0",percentageText:"60-70% CT",percentageValue:70,tutEstimated:"~60-72s",techniqueNote:"Gomiti fissi ai fianchi per tutto il movimento, angolo gomito-busto vicino a 0\xB0 (letteralmente attaccati) \u2014 il punto pi\xF9 importante: se i gomiti si allontanano dal corpo, il lavoro si sposta su petto e spalle. Busto leggermente inclinato in avanti (10-15\xB0), parti da gomito flesso a circa 90\xB0 e spingi la maniglia (o corda) verso il basso fino a estensione completa del gomito (circa 170-175\xB0). Nessun cedimento: serve solo a pre-affaticare e irrorare di sangue il capo laterale.",techniqueMeta:{type:"preattivazione",toFailure:!1}},{id:"c5",name:"Estensione tricipiti al cavo basso (overhead)",role:"Pre-attivazione \u2014 capo lungo tricipite",equipment:"Cavi",seriesCount:1,repsRange:"10-12",rom:"Completo, massimo stiramento dietro nuca",cadence:"3-1-3-0",percentageText:"60-70% CT",percentageValue:70,tutEstimated:"~70-84s",techniqueNote:"Schiena rivolta alla stazione cavi, maniglia dietro la testa con entrambe le mani, gomiti puntati in alto e fissi vicino alle orecchie (braccia a circa 170-180\xB0 sopra la testa) \u2014 la parte superiore del braccio non si muove, solo l'avambraccio, che parte flesso a circa 40-50\xB0 dietro la nuca. Estendi portando la maniglia in avanti/alto fino a quasi distendere il gomito (170\xB0). Questa angolazione mette in forte stiramento il capo lungo del tricipite, che origina dalla scapola. Pausa di 1s in massimo stiramento per eliminare l'energia elastica.",techniqueMeta:{type:"preattivazione",toFailure:!1}},{id:"c6",name:"Panca Piana presa stretta al Multipower",role:"Target Set \u2014 tutte e tre le teste tricipiti",equipment:"Multipower",seriesCount:1,repsRange:"8 + 4 + max",rom:"Completo, gomiti stretti ai fianchi",cadence:"4-0-4-0",percentageText:"100% \u2192 75% \u2192 55% CT",percentageValue:100,tutEstimated:"~64s + stripping",techniqueNote:"Impugnatura poco pi\xF9 stretta della larghezza spalle (25-30cm tra le mani) \u2014 una presa eccessivamente stretta aumenta lo stress al polso senza beneficio. Punto chiave: i gomiti scivolano vicino ai fianchi in discesa (angolo gomito-busto di circa 30-40\xB0, non aperti a 90\xB0) anzich\xE9 aprirsi verso l'esterno \u2014 \xE8 questo che sposta il lavoro dal pettorale al tricipite. Discesa fino a sfiorare lo sterno (gomiti flessi a circa 70-80\xB0), risalita senza bloccare i gomiti (fino a circa 170\xB0). Stripping (doppio drop set): cedimento a 100%, scala 25%, cedi, scala 20%, cedi.",techniqueMeta:{type:"target",toFailure:!0,stripping:[{pct:75,label:"Drop 1"},{pct:55,label:"Drop 2"}]}},{id:"c7",name:"Chest Press presa stretta",role:"Rifinitura/chiusura tricipiti",equipment:"Macchina",seriesCount:1,repsRange:"max",rom:"Completo",cadence:"3-0-3-0",percentageText:"35-45% CT",percentageValue:40,tutEstimated:"Variabile",techniqueNote:"Stessa macchina Chest Press usata per il petto, ma con gomiti stretti ai fianchi durante tutta l'esecuzione (angolo gomito-busto di circa 20-30\xB0, molto pi\xF9 chiuso che nella versione petto) per isolare ulteriormente il tricipite. A questo punto il muscolo \xE8 quasi esaurito: carico contenuto (35-45% CT), ma sufficiente a raggiungere il cedimento in poche rep e chiudere lo stimolo su tutte e tre le teste.",techniqueMeta:{type:"rifinitura",toFailure:!0}},{id:"c10",name:"Curl ai cavi bassi (presa larga)",role:"Pre-attivazione \u2014 bicipiti (entrambi i capi)",equipment:"Cavi",seriesCount:1,repsRange:"10-12",rom:"Completo, gomiti fissi lungo i fianchi",cadence:"3-0-3-0",percentageText:"60-70% CT",percentageValue:70,tutEstimated:"~60-72s",techniqueNote:"Gomiti fissi lungo i fianchi per tutto il movimento, busto verticale senza oscillare (niente slancio delle spalle). Impugnatura larga quanto le spalle sulla barra o maniglia del cavo basso: questa presa pi\xF9 ampia, rispetto a un curl standard, pre-affatica in modo bilanciato entrambi i capi del bicipite (lungo e breve) senza enfatizzarne uno in particolare \u2014 a differenza del target set che invece li alterna di ciclo in ciclo. Discesa controllata di 3s fino a quasi estensione completa del gomito, risalita di 3s. Nessun cedimento: serve solo a pre-affaticare e irrorare di sangue il bicipite prima del vero stimolo.",techniqueMeta:{type:"preattivazione",toFailure:!1}},{id:"c8",name:"Curl con bilanciere o manubri (a rotazione)",role:"Target Set \u2014 bicipiti",equipment:"Bilanciere",seriesCount:1,repsRange:"8 + isometria",rom:"Completo, quasi estensione completa",cadence:"4-0-4-2 (min.)",percentageText:"100% CT",percentageValue:100,tutEstimated:"~64s + isometria",techniqueNote:"In piedi, gomiti fissi lungo i fianchi per tutta la durata \u2014 nessuna oscillazione del busto o slancio delle spalle (il classico 'cheating' che vanifica lo stimolo). Discesa controllata di 4s fino a estensione quasi completa, risalita di 4s. Al vero cedimento, mantieni il carico fermo in isometria a circa 90\xB0 per il massimo tempo possibile \u2014 picco isometrico terminale che massimizza il danno strutturale controllato. Alterna bilanciere dritto/EZ (capo breve) e manubri con supinazione progressiva (capo lungo e brachiale) tra un ciclo e l'altro.",techniqueMeta:{type:"target",toFailure:!0,terminalIsometric:!0}}]}],si={id:"X",name:"Complementari",subtitle:"Complementari (opzionali)",description:"Esercizi OPZIONALI, fuori dal protocollo puro. Servono per equilibrio posturale e gruppi minori che la scheda minimalista non copre direttamente. Aggiungili a fine seduta 1-2 volte a settimana, una sola serie a cedimento (o quasi), senza esagerare col volume.",exercises:[{id:"x1",name:"Iperestensioni (banco lombare 45\xB0 o orizzontale)",role:"Erettori spinali / lombari",equipment:"Corpo Libero",seriesCount:1,repsRange:"10-12",rom:"Completo controllato, senza iperestendere oltre la linea del corpo",cadence:"3-1-3-0",percentageText:"Corpo libero / disco al petto",percentageValue:100,tutEstimated:"~70s",techniqueNote:"Fianchi appoggiati sul cuscinetto, busto che parte flesso in avanti di circa 60-70\xB0 rispetto alle gambe (a seconda del banco). Sali fino ad allineare il busto con le gambe (circa 180\xB0, linea retta), MAI oltre (niente iperestensione lombare oltre l'orizzontale). Pausa 1s in contrazione. Aggiungi un disco al petto se il corpo libero \xE8 troppo facile. Movimento lento e controllato, mai a scatti.",techniqueMeta:{type:"target",toFailure:!0}},{id:"x2",name:"Tibialis raise (dorsiflessione)",role:"Tibiale anteriore",equipment:"Corpo Libero",seriesCount:1,repsRange:"15-20",rom:"Completo, massima dorsiflessione",cadence:"2-1-2-1",percentageText:"Corpo libero / disco sulle punte",percentageValue:100,tutEstimated:"~80-100s",techniqueNote:"Talloni a terra (o schiena al muro), parti con il piede quasi piatto (caviglia a circa 90\xB0) e solleva le punte dei piedi il pi\xF9 in alto possibile contro resistenza (dorsiflessione fino a circa 60-70\xB0 rispetto al pavimento). Muscolo tonico: risponde ad alte ripetizioni e TUT lungo. Ottimo per prevenire shin splints e squilibri con i polpacci.",techniqueMeta:{type:"target",toFailure:!0}},{id:"x3",name:"Scrollate / Shrug (manubri o bilanciere)",role:"Trapezio superiore",equipment:"Manubri",seriesCount:1,repsRange:"10-12",rom:"Elevazione scapolare completa",cadence:"2-1-2-1",percentageText:"100% CT",percentageValue:100,tutEstimated:"~60s",techniqueNote:"Solo elevazione verticale delle spalle verso le orecchie (traiettoria dritta, non circolare): niente rotazione delle spalle (inutile e rischiosa). Parti da spalle rilassate (posizione neutra) e sali portando le scapole il pi\xF9 vicino possibile alle orecchie, senza flettere i gomiti. Pausa 1s in massima contrazione in alto, discesa controllata fino al completo allungamento del trapezio (spalle che tornano gi\xF9 oltre la posizione neutra di partenza).",techniqueMeta:{type:"target",toFailure:!0}},{id:"x4",name:"Wrist curl (curl del polso)",role:"Flessori dell'avambraccio",equipment:"Bilanciere",seriesCount:1,repsRange:"12-15",rom:"Completo del polso",cadence:"2-0-2-1",percentageText:"100% CT",percentageValue:100,tutEstimated:"~60-75s",techniqueNote:"Avambracci appoggiati su panca o cosce, polso libero di muoversi oltre il bordo, solo i polsi si muovono (angolo di flessione, circa 60-70\xB0 di escursione totale). Presa in supinazione, palmo verso l'alto. Isometria 1s in massima contrazione.",techniqueMeta:{type:"target",toFailure:!0}},{id:"x10",name:"Wrist curl inverso (reverse wrist curl)",role:"Estensori dell'avambraccio",equipment:"Bilanciere",seriesCount:1,repsRange:"12-15",rom:"Completo del polso",cadence:"2-0-2-1",percentageText:"100% CT specifico",percentageValue:100,tutEstimated:"~60-75s",techniqueNote:"Stessa posizione del wrist curl diretto, ma presa in pronazione (palmo verso il basso): solleva il bilanciere estendendo il polso verso l'alto. Gli estensori sono pi\xF9 deboli dei flessori \u2014 usa un carico nettamente pi\xF9 leggero (spesso 30-50% del wrist curl diretto) e non forzare. Utile per bilanciare lo sviluppo dell'avambraccio e prevenire l'epicondilite del gomito ('gomito del tennista'), frequente quando si allenano solo i flessori.",techniqueMeta:{type:"target",toFailure:!0}},{id:"x5",name:"Face pull ai cavi",role:"Deltoide posteriore + retrattori scapolari",equipment:"Cavi",seriesCount:1,repsRange:"12-15",rom:"Completo, extrarotazione a fine corsa",cadence:"2-1-2-1",percentageText:"100% CT specifico",percentageValue:100,tutEstimated:"~75s",techniqueNote:"Corda alla pulley alta, braccia tese in avanti all'altezza del viso: tira verso il viso con i gomiti che salgono sopra il livello delle spalle (circa 100-110\xB0 rispetto al busto), extraruotando le spalle a fine corsa (avambracci che ruotano da paralleli al pavimento a quasi verticali). Focus sulla retrazione scapolare, non sul carico. Complementare al Reverse Fly del Workout C: insieme completano la salute della spalla e correggono la postura da spalle chiuse.",techniqueMeta:{type:"target",toFailure:!0}},{id:"x6",name:"Hip Thrust (bilanciere o macchina dedicata)",role:"Grande gluteo \u2014 isolamento diretto",equipment:"Bilanciere",seriesCount:1,repsRange:"10-12",rom:"Completo, massima estensione d'anca in alto",cadence:"3-1-3-1",percentageText:"100% CT",percentageValue:100,tutEstimated:"~80s",techniqueNote:"Schiena appoggiata a panca (scapole all'altezza del bordo), bilanciere (con multipad) o macchina dedicata sul bacino, piedi larghezza spalle con ginocchia a circa 90\xB0 nel punto pi\xF9 alto. Parti con l'anca abbassata (angolo tronco-coscia di circa 100-110\xB0) e sali fino a estensione completa dell'anca (tronco e cosce allineati, circa 170-180\xB0) con pausa di 1s in massima contrazione del gluteo, mento leggermente in dentro per non iperestendere la lombare. A differenza di squat e leg press, qui il gluteo \xE8 il motore primario in tutto il ROM, specialmente a fine corsa dove gli altri esercizi lo scaricano.",techniqueMeta:{type:"target",toFailure:!0}},{id:"x7",name:"Sovraspinato ai cavi bassi (extra-rotazione)",role:"Cuffia dei rotatori \u2014 sovraspinato",equipment:"Cavi",seriesCount:1,repsRange:"12-15",rom:"Completo, dall'anca fino all'altezza della spalla, sul piano della scapola (~30-45\xB0 avanti al piano frontale)",cadence:"2-1-2-1",percentageText:"Carico molto leggero",percentageValue:100,tutEstimated:"~75s",techniqueNote:"Alla pulley bassa, fianco verso la stazione cavi, braccio lungo il corpo con pollice verso l'alto. Solleva il braccio disteso fino all'altezza della spalla, muovendoti sul piano della scapola (leggermente avanti rispetto al fianco, non lateralmente puro). Carico volutamente minimo: \xE8 un muscolo piccolo e delicato, l'obiettivo \xE8 il controllo motorio e la salute della spalla, non l'ipertrofia. Non spingere mai fino a fastidio articolare.",techniqueMeta:{type:"target",toFailure:!1}},{id:"x8",name:"Scapolari ai cavi alti",role:"Retrattori scapolari / cuffia dei rotatori",equipment:"Cavi",seriesCount:1,repsRange:"12-15",rom:"Completo, retrazione scapolare pura senza flettere i gomiti",cadence:"2-1-2-1",percentageText:"Carico leggero",percentageValue:100,tutEstimated:"~75s",techniqueNote:"Alla pulley alta o media, braccia quasi tese (gomiti a circa 160-170\xB0, leggermente morbidi), il movimento parte ESCLUSIVAMENTE dalla scapola (la si 'chiude' verso la colonna, un'escursione di pochi centimetri) senza flettere i gomiti come in una trazione. Pausa 1s in massima retrazione. Lavora in sinergia con il Face Pull e il Sovraspinato per la salute generale della spalla.",techniqueMeta:{type:"target",toFailure:!1}},{id:"x9",name:"Curl su panca inclinata (capo lungo)",role:"Isolamento bicipiti \u2014 capo lungo (Isometria Terminale)",equipment:"Manubri",seriesCount:1,repsRange:"8-10 + isometria",rom:"Completo, braccia dietro il busto",cadence:"3-0-3-2 (min.)",percentageText:"100% CT specifico",percentageValue:100,tutEstimated:"~56-70s + isometria",techniqueNote:"Copre il capo lungo del bicipite (il picco esterno), che il curl standard colpisce meno. Seduto su panca inclinata a 45-60\xB0, braccia che pendono verticali dietro la linea del busto: questa posizione mette il capo lungo in massimo allungamento, dove lavora di pi\xF9. Curl completo con leggera pausa in contrazione, discesa controllata di 3s fino a estensione quasi completa senza scaricare la tensione. Al vero cedimento, mantieni il curl bloccato in isometria a circa 90\xB0 per il massimo tempo possibile \u2014 lo stesso picco isometrico terminale del Curl principale (c8), coerente sull'altro capo del bicipite. In alternativa: curl a martello (presa neutra) che coinvolge capo lungo e brachiale. Eseguilo dopo il curl principale di Workout C.",techniqueMeta:{type:"target",toFailure:!0,terminalIsometric:!0}}]},GC=[{id:"H1",name:"Casa A",subtitle:"Parte Superiore (spinta & trazione)",description:"Petto, spalle, tricipiti, dorso, bicipiti e core a corpo libero e TRX. L'intensit\xE0 si regola con l'angolo del corpo, la leva e la cadenza, non col carico. Una serie target a cedimento per movimento.",exercises:[{id:"h1",name:"Piegamenti (push-up) \u2014 presa media",role:"Target Set \u2014 petto, tricipiti, deltoide anteriore",equipment:"Corpo Libero",seriesCount:1,repsRange:"max (8-15)",rom:"Completo, petto a sfiorare il pavimento",cadence:"4-0-4-0",percentageText:"Corpo libero (regola con l'angolo)",percentageValue:100,tutEstimated:"~64-120s",techniqueNote:"Mani poco pi\xF9 larghe delle spalle, corpo in linea retta dalla testa ai talloni (addome e glutei contratti, niente bacino che cede verso il basso). Discesa di 4s fino a sfiorare il pavimento con il petto (non con la pancia), gomiti a circa 45\xB0 dal busto, non aperti a 90\xB0. Risalita di 4s senza bloccare del tutto i gomiti in alto. Se arrivi a pi\xF9 di 15 rep pulite, rendi l'esercizio pi\xF9 difficile: piedi rialzati su una sedia (enfasi sul petto alto/spalle) oppure passa alla versione archer/a una mano assistita. Se non arrivi a 8, appoggia le ginocchia o alza le mani su un rialzo. Vai al vero cedimento sull'ultima rep possibile in forma corretta.",techniqueMeta:{type:"target",toFailure:!0}},{id:"h2",name:"Pike push-up (piegamenti a V)",role:"Target Set \u2014 deltoidi (spinta verticale)",equipment:"Corpo Libero",seriesCount:1,repsRange:"max (6-12)",rom:"Completo, testa verso il pavimento",cadence:"4-0-4-0",percentageText:"Corpo libero (regola con l'angolo)",percentageValue:100,tutEstimated:"~48-96s",techniqueNote:"Posizione a V rovesciata: bacino alto, mani e piedi a terra, corpo che forma un angolo di circa 90\xB0 o meno all'altezza dei fianchi (pi\xF9 l'angolo si chiude, pi\xF9 il movimento diventa verticale). Pi\xF9 avvicini i piedi alle mani e pi\xF9 alzi il bacino, pi\xF9 il carico si sposta sulle spalle (verticalizzando la spinta). Discesa di 4s portando la sommit\xE0 della testa verso il pavimento tra le mani, gomiti che si aprono lateralmente in modo controllato fino a circa 45\xB0 dal busto. Risalita di 4s fino a gomiti quasi tesi (circa 160-170\xB0). Per aumentare l'intensit\xE0, rialza i piedi su una sedia (diventa quasi una verticale). Vai a cedimento. \xC8 la spinta verticale che sostituisce il lento in palestra.",techniqueMeta:{type:"target",toFailure:!0}},{id:"h3",name:"Trazioni alla sbarra o rematore al TRX",role:"Target Set \u2014 dorso in ampiezza, bicipiti",equipment:"Corpo Libero",seriesCount:1,repsRange:"max (5-12)",rom:"Completo, dead hang \u2192 mento sopra la barra",cadence:"3-0-3-0",percentageText:"Corpo libero / TRX",percentageValue:100,tutEstimated:"~30-72s",techniqueNote:"Se hai una sbarra: presa prona larghezza spalle, parti da braccia completamente estese (dead hang, gomiti a circa 170\xB0) e sali fino a portare il mento sopra la barra (gomiti flessi a circa 30-40\xB0), iniziando il movimento dalla retrazione delle scapole prima di flettere i gomiti. Niente slanci del bacino (kipping). Discesa controllata di 3s. Se non riesci a fare trazioni complete, fai negative lente (salti su e scendi in 5-8s) oppure usa il TRX per il rematore verticale assistito. Se non hai una sbarra, esegui il rematore al TRX (o rematore australiano sotto un tavolo robusto): corpo inclinato all'indietro a circa 30-45\xB0 rispetto al pavimento (pi\xF9 ti avvicini all'orizzontale, pi\xF9 aumenta l'intensit\xE0), maniglie in mano, tiri il petto verso le mani mantenendo il corpo rigido e retraendo le scapole, gomiti che arrivano a circa 30-40\xB0 dal busto in massima contrazione. Vai a cedimento.",techniqueMeta:{type:"target",toFailure:!0}},{id:"h4",name:"Dip tra due sedie (o push-up diamante)",role:"Target Set \u2014 tricipiti",equipment:"Corpo Libero",seriesCount:1,repsRange:"max (8-15)",rom:"Completo, spalle sotto la linea dei gomiti",cadence:"4-0-4-0",percentageText:"Corpo libero",percentageValue:100,tutEstimated:"~64-120s",techniqueNote:"Se hai due superfici stabili alla stessa altezza (sedie robuste, angolo di due mobili): mani in appoggio, corpo tra le due, gambe piegate o distese in avanti. Scendi in 4s fino a portare le spalle appena sotto la linea dei gomiti (senza forzare oltre, per proteggere la spalla), risali in 4s senza bloccare i gomiti. Busto il pi\xF9 verticale possibile per enfatizzare il tricipite (inclinato in avanti sposterebbe il lavoro sul petto). In alternativa pi\xF9 sicura, esegui i push-up diamante: mani unite sotto lo sterno con pollici e indici che formano un rombo, stessa cadenza. Vai a cedimento.",techniqueMeta:{type:"target",toFailure:!0}},{id:"h5",name:"Plank + varianti oblique",role:"Core \u2014 isometria anti-estensione + obliqui",equipment:"Corpo Libero",seriesCount:1,repsRange:"max (isometria)",rom:"Isometrico + rotazioni",cadence:"Isometria",percentageText:"Corpo libero",percentageValue:100,tutEstimated:"~60-120s",techniqueNote:"Plank sugli avambracci: corpo in linea retta (circa 180\xB0 da testa a talloni, nessuna rottura all'anca), gomiti sotto le spalle (angolo di circa 90\xB0 tra braccio e avambraccio), addome e glutei contratti, bacino n\xE9 alto n\xE9 cedente. Tieni la posizione fino al cedimento della forma (quando il bacino inizia a cadere, fermati). Per gli obliqui, aggiungi subito dopo il side plank per lato (in appoggio su un avambraccio, corpo di fianco in linea retta, anche impilate una sopra l'altra) fino al cedimento per lato. Respira sempre, non trattenere il fiato. \xC8 l'unico esercizio 'a tempo' invece che a ripetizioni: cronometra e cerca di superare il tempo precedente ciclo dopo ciclo.",techniqueMeta:{type:"target",toFailure:!0}},{id:"h11",name:"Chest press al TRX",role:"Target Set alternativo \u2014 petto, tricipiti (TRX)",equipment:"TRX",seriesCount:1,repsRange:"max (8-15)",rom:"Completo, mani a sfiorare il petto in basso",cadence:"4-0-4-0",percentageText:"TRX (regola con l'angolo del corpo)",percentageValue:100,tutEstimated:"~64-120s",techniqueNote:"Rivolto verso il pavimento, maniglie TRX in mano, corpo inclinato in avanti in linea retta (pi\xF9 i piedi sono avanti e il corpo orizzontale, pi\xF9 \xE8 difficile). Discesa di 4s lasciando che le mani arrivino ai lati del petto, gomiti a circa 45\xB0 dal busto, corpo sempre rigido come una tavola (addome e glutei contratti). Spingi in 4s tornando a braccia tese senza cedere col bacino. Regola l'intensit\xE0 camminando coi piedi in avanti (pi\xF9 duro) o indietro (pi\xF9 facile). Alternativa/complemento ai push-up per il petto quando vuoi un ROM maggiore e tensione costante. Vai a cedimento.",techniqueMeta:{type:"target",toFailure:!0}},{id:"h12",name:"Curl bicipiti al TRX",role:"Target Set \u2014 bicipiti (TRX)",equipment:"TRX",seriesCount:1,repsRange:"max (8-15)",rom:"Completo, dalla estensione alla massima flessione",cadence:"4-0-4-1",percentageText:"TRX (regola con l'angolo del corpo)",percentageValue:100,tutEstimated:"~72-135s",techniqueNote:"Rivolto verso l'ancoraggio TRX, maniglie in mano con presa supina (palmi verso l'alto), corpo inclinato all'indietro in linea retta. I gomiti restano alti e fissi, puntati in avanti all'altezza delle spalle: solo l'avambraccio si muove, portando le mani verso la fronte. Il bicipite a corpo libero \xE8 difficile da isolare \u2014 il TRX lo rende possibile regolando l'inclinazione del corpo (pi\xF9 orizzontale = pi\xF9 difficile). Discesa di 4s in controllo fino a estensione, pausa di 1s in massima contrazione. Vai a cedimento.",techniqueMeta:{type:"target",toFailure:!0}}]},{id:"H2",name:"Casa B",subtitle:"Parte Inferiore & Gambe",description:"Quadricipiti, femorali, glutei e polpacci a corpo libero e TRX. Senza carico esterno, l'intensit\xE0 arriva dal lavoro mono-podalico, dalla cadenza lentissima, dalle isometrie e dalla leva del TRX. Una serie target a cedimento per movimento.",exercises:[{id:"h6",name:"Squat a corpo libero (o bulgaro se troppo facile)",role:"Target Set \u2014 quadricipiti, glutei",equipment:"Corpo Libero",seriesCount:1,repsRange:"max (12-25)",rom:"Completo, coscia sotto il parallelo",cadence:"4-0-4-0",percentageText:"Corpo libero (mono-podalico se troppo facile)",percentageValue:100,tutEstimated:"~96-200s",techniqueNote:"Piedi larghezza spalle, punte leggermente extraruotate (10-15\xB0). Scendi in 4s fino a portare le cosce sotto il parallelo (ginocchio flesso a circa 90\xB0 o meno, o alla massima profondit\xE0 con la schiena neutra), ginocchia che seguono la direzione delle punte senza collassare verso l'interno, tallone sempre a terra. Risali in 4s senza bloccare le ginocchia (fino a circa 170\xB0). Se superi le 25 rep pulite, l'esercizio non \xE8 pi\xF9 abbastanza intenso: passa allo split squat bulgaro (piede posteriore rialzato su una sedia, tutto il peso sulla gamba anteriore, ginocchio anteriore che scende fino a circa 90-100\xB0) che rende il carico sufficiente a cedere in 10-15 rep per gamba. Vai a cedimento.",techniqueMeta:{type:"target",toFailure:!0}},{id:"h7",name:"Affondi in camminata o statici",role:"Target Set \u2014 quadricipiti, glutei (unilaterale)",equipment:"Corpo Libero",seriesCount:1,repsRange:"max (10-20 per gamba)",rom:"Completo, ginocchio posteriore verso il pavimento",cadence:"3-0-3-0",percentageText:"Corpo libero",percentageValue:100,tutEstimated:"~60-120s per gamba",techniqueNote:"Passo lungo in avanti, scendi finch\xE9 il ginocchio posteriore sfiora il pavimento e quello anteriore forma un angolo di circa 90\xB0 (senza superare la punta del piede). Busto eretto, core contratto. Risali spingendo con il tallone anteriore. Alterna le gambe (in camminata) o completa tutte le rep su una gamba e poi l'altra (statici, pi\xF9 intensi). Il lavoro unilaterale raddoppia di fatto il carico relativo su ciascuna gamba, rendendolo adeguato allo stimolo HIT anche senza pesi. Vai a cedimento per gamba.",techniqueMeta:{type:"target",toFailure:!0}},{id:"h8",name:"Hip thrust / ponte glutei a una gamba",role:"Target Set \u2014 glutei, femorali",equipment:"Corpo Libero",seriesCount:1,repsRange:"max (12-20 per lato)",rom:"Completo, massima estensione d'anca",cadence:"3-1-3-1",percentageText:"Corpo libero (mono-podalico)",percentageValue:100,tutEstimated:"~96-160s per lato",techniqueNote:"Sdraiato supino, spalle a terra (o appoggiate a un divano per pi\xF9 ROM), un piede a terra con ginocchio flesso a circa 90\xB0 e l'altra gamba distesa in aria. Parti con il bacino a terra (anca flessa a circa 100-110\xB0) e spingi con il tallone a terra sollevando il bacino fino alla completa estensione dell'anca (circa 170-180\xB0, corpo allineato dalle spalle al ginocchio), strizzando il gluteo con una pausa di 1s in alto. Il lavoro a una gamba sola fornisce resistenza sufficiente a corpo libero. Discesa controllata senza appoggiare del tutto il bacino tra le rep (tensione continua). Mento leggermente in dentro, non inarcare la lombare per 'allungare' il movimento: l'estensione deve venire dall'anca, non dalla schiena. Vai a cedimento per lato.",techniqueMeta:{type:"target",toFailure:!0}},{id:"h9",name:"Nordic curl assistito o leg curl con asciugamano",role:"Target Set \u2014 femorali (catena posteriore)",equipment:"Corpo Libero",seriesCount:1,repsRange:"max (5-12)",rom:"Completo controllato",cadence:"Eccentrica lenta",percentageText:"Corpo libero",percentageValue:100,tutEstimated:"~40-90s",techniqueNote:"I femorali sono difficili da colpire a corpo libero: il Nordic curl \xE8 la soluzione. In ginocchio con le caviglie bloccate sotto un mobile pesante (o un aiuto che le tiene), corpo che parte allineato dalle ginocchia alla testa (circa 180\xB0, ginocchia a 90\xB0 come perno), scendi in avanti il pi\xF9 lentamente possibile controllando la discesa SOLO con i femorali fino a dove riesci a mantenere il controllo (idealmente fino quasi a terra, tronco-coscia che si apre verso i 45-60\xB0), poi aiutati con le mani a spingere sul pavimento per risalire. Se \xE8 troppo difficile, riduci il ROM (scendi solo di pochi gradi mantenendo il controllo) e aumenta gradualmente nel tempo. In alternativa, su pavimento scivoloso con un asciugamano sotto i talloni: da posizione di ponte (bacino sollevato, anca a circa 170\xB0), estendi e fletti le gambe scivolando avanti e indietro, mantenendo sempre il bacino alto e la tensione sui femorali. Vai a cedimento sulla componente eccentrica.",techniqueMeta:{type:"target",toFailure:!0}},{id:"h10",name:"Calf raise a una gamba",role:"Target Set \u2014 polpacci",equipment:"Corpo Libero",seriesCount:1,repsRange:"max (15-25 per gamba)",rom:"Completo, massimo allungamento in basso",cadence:"2-1-2-1",percentageText:"Corpo libero (una gamba)",percentageValue:100,tutEstimated:"~90-150s per gamba",techniqueNote:"In piedi su una gamba sola, avampiede su un rialzo (un gradino, un libro spesso) con il tallone libero di scendere sotto il livello. Tieniti a una parete solo per l'equilibrio, non per scaricare il peso. Sali sulla punta fino alla massima estensione della caviglia (circa 150-160\xB0) con pausa di 1s in alto, poi scendi lentamente fino al massimo allungamento in basso (caviglia flessa a circa 70-80\xB0) con pausa di 1s. Il lavoro a una gamba fornisce il sovraccarico necessario. Al cedimento, puoi aggiungere qualche rep parziale nella zona bassa di allungamento ('a pistone', Zone Training) come in palestra. Vai a cedimento per gamba.",techniqueMeta:{type:"target",toFailure:!0,hybrid:{fullRomLabel:"Rep complete",partialLabel:"Rep parziali (allungamento, 'a pistone')",partialRange:"8-10"}}},{id:"h13",name:"Leg curl al TRX (femorali)",role:"Target Set alternativo \u2014 femorali (TRX)",equipment:"TRX",seriesCount:1,repsRange:"max (10-18)",rom:"Completo, dai talloni tesi alla massima flessione",cadence:"3-1-3-0",percentageText:"TRX",percentageValue:100,tutEstimated:"~70-126s",techniqueNote:"Supino a terra, talloni infilati nelle maniglie del TRX (basse), gambe tese (ginocchio a circa 170-180\xB0) e bacino sollevato in linea con il corpo (posizione di ponte, anca a circa 170\xB0). Mantenendo il bacino alto per tutta la serie, fletti le ginocchia tirando i talloni verso i glutei in 3s (fino a un angolo del ginocchio di circa 40-50\xB0), pausa di 1s in massima contrazione dei femorali, poi estendi in 3s senza far cadere il bacino. Alternativa pi\xF9 efficace del leg curl con asciugamano: il TRX permette un ROM pieno e tensione costante sui femorali, i muscoli pi\xF9 difficili da raggiungere a corpo libero. Vai a cedimento.",techniqueMeta:{type:"target",toFailure:!0}}]}],G5=[{category:"Petto",equipment:"Cavi",baseExercise:"Croci ai cavi (pulley medie)",variantName:"Croci ai cavi bassi",setup:"Pulley posizionate in basso, movimento dal basso verso l'alto e verso il centro",whatChanges:"Sposta l'enfasi sulle fibre alte/clavicolari del pettorale",forExerciseIds:["a1"]},{category:"Petto",equipme -affatica selettivamente una porzione del muscolo (es. fibre basse del petto) cos\xEC il target set successivo la coinvolge di pi\xF9.",how:"10-12 rep controllate, fermarsi sempre un po' prima del cedimento vero. Nessuna pausa prima del prossimo esercizio se \xE8 un pre-esaurimento diretto."},{key:"target",title:"Target Set (cedimento vero)",tag:"Il vero stimolo",color:"red",what:"L'UNICA serie realmente allenante per gruppo muscolare, portata al vero cedimento concentrico: l'ultima ripetizione deve essere impossibile da completare in forma corretta.",why:"\xC8 il principio cardine del metodo: un volume minimo ma un'intensit\xE0 massima genera lo stimolo ipertrofico, evitando il sovrallenamento.",how:"Rispetta la cadenza fino all'ultima rep. Non fermarti prima per timore: il cedimento tecnico \xE8 l'obiettivo, non un incidente."},{key:"stripping",title:"Stripping (Drop Set)",tag:"Estensione del cedimento",color:"orange",what:"Dopo il cedimento al 100% del CT, si riduce il carico del 20-25% e si continua SENZA RECUPERO fino a un nuovo cedimento, ripetendo 1-2 volte.",why:"Estende la serie oltre il primo cedimento, reclutando ulteriori unit\xE0 motorie quando le prime sono gi\xE0 esaurite.",how:"Zero secondi di recupero tra un'onda e l'altra \u2014 solo il tempo di scalare il peso. Il carico continua a scendere, non risalire."},{key:"hybrid",title:"Ibrido HD/ZT (parziali in zona)",tag:"Heavy Duty + Zone Training",color:"purple",what:"Dopo il cedimento a ROM completo (stile Heavy Duty), si continua IMMEDIATAMENTE con ripetizioni parziali 'a pistone' in una porzione ridotta del movimento (stile Zone Training di Brian Johnston).",why:"La fase HD recluta le fibre rapide con tensione meccanica; la fase ZT le satura di sangue (ischemia locale), massimizzando la sintesi proteica in un'unica serie.",how:"Cedimento vero a ROM completo, poi senza pausa alcuna mezze ripetizioni continue nella zona di massimo accorciamento (o stiramento, a seconda dell'esercizio) fino a cedimento assoluto."},{key:"terminalIsometric",title:"Isometria Terminale",tag:"Picco isometrico",color:"indigo",what:"Al cedimento concentrico, invece di terminare la serie, si mantiene il carico fermo in massima contrazione (es. curl a 90\xB0) per il massimo tempo possibile.",why:"Massimizza il danno strutturale controllato sulle fibre gi\xE0 sotto tensione, oltre il limite del movimento dinamico.",how:"Appena non riesci pi\xF9 a completare la fase concentrica, blocca il peso nella posizione raggiunta e resisti il pi\xF9 a lungo possibile prima di cedere."},{key:"superset",title:"Superserie di Pre-esaurimento Inverso",tag:"Due esercizi, zero pausa",color:"pink",what:"Due target set consecutivi sullo stesso gruppo muscolare, eseguiti senza alcun recupero tra loro (es. Lento al Multipower \u2192 Alzate Laterali).",why:"Il movimento multiarticolare pesante viene prima; l'isolamento subito dopo colpisce il fascio gi\xE0 parzialmente affaticato da un'angolazione diversa.",how:"Appena raggiunto il cedimento nel primo esercizio, passa immediatamente al secondo \u2014 zero secondi, nessuna pausa per recuperare fiato."},{key:"giantSet",title:"Giant Set (solo Workout B \u2014 Gambe)",tag:"7 stazioni, un'unica ondata",color:"emerald",what:"Sette esercizi per le gambe eseguiti in sequenza, con 45-60s di recupero tra una stazione e l'altra, dal multiarticolare pesante fino ai piccoli isolamenti.",why:"Non \xE8 una serie di superserie separate: \xE8 un'unica ondata di fatica progressiva su tutta la muscolatura di coscia e anca. Il breve recupero tra le stazioni permette di cambiare macchina e ricomporsi senza raffreddare completamente il sistema.",how:"Prepara mentalmente il percorso tra le 7 macchine prima di iniziare. Riscaldamento generale + ramping allo squat obbligatori prima di partire. Richiede almeno 3 giorni pieni di recupero dopo."},{key:"rifinitura",title:"Rifinitura / Chiusura",tag:"Cedimento a carico ridotto",color:"gray",what:"Un ultimo esercizio a carico contenuto (35-45% CT), eseguito quando il muscolo \xE8 gi\xE0 quasi esausto da stripping o pre-attivazioni precedenti.",why:"Il muscolo target \xE8 gi\xE0 praticamente esaurito: non serve un carico alto per raggiungere il cedimento e 'chiudere' completamente lo stimolo.",how:"Esegui a cedimento con il carico ridotto indicato, senza cercare di alzare il peso \u2014 la fatica accumulata fa il lavoro."},{key:"copertura",title:"Copertura Muscolare (zone)",tag:"Allena tutte le aree del muscolo",color:"amber",what:"Molti muscoli hanno pi\xF9 aree/fibre con orientamenti diversi (es. il petto ha porzione alta, media, bassa; le spalle anteriore, laterale, posteriore). Ogni esercizio o variante enfatizza una zona specifica.",why:"Allenare sempre la stessa zona lascia le altre sotto-stimolate e crea sviluppo squilibrato. L'obiettivo \xE8 che, tra gli esercizi di un workout, ogni zona del muscolo riceva stimolo \u2014 senza per\xF2 ridondare (due esercizi sulla stessa zona sono uno sprecato).",how:"Il pannello Copertura mostra quali zone sono coperte (\u2713 verde) e quali no (\u25CB ambra) in base alle varianti attive. Se manca una zona, tocca 'Applica' per impostare la variante che la copre. Nota: se un gruppo ha meno esercizi che zone (es. 1 solo esercizio bicipiti), le zone si coprono ruotando la variante tra un ciclo e l'altro, non nella stessa seduta."},{key:"livello",title:"Livello \u2014 Intermedio / Avanzato",tag:"A chi \xE8 adatto",color:"gray",what:"Questo protocollo richiede la capacit\xE0 di portare una serie al vero cedimento muscolare con tecnica corretta, e di gestire tecniche di intensit\xE0 (stripping, Zone Training, isometrie).",why:"Il HIT vive sul cedimento reale: un principiante spesso non sa ancora spingersi fin l\xEC in sicurezza, n\xE9 ha la connessione mente-muscolo per farlo bene. Serve una base di almeno 6-12 mesi di allenamento strutturato.",how:"Se ti alleni da tempo e sai cosa significa 'non riuscire a completare un'altra ripetizione in forma corretta', sei nel target. Altrimenti, costruisci prima una base con un approccio pi\xF9 classico."},{key:"frequenza",title:"Frequenza Flessibile",tag:"Non a giorni fissi",color:"blue",what:"Non ti alleni a giorni fissi del calendario (es. 'luned\xEC petto'), ma in base al recupero effettivo di ogni gruppo muscolare.",why:"Il muscolo cresce durante il riposo, non durante l'allenamento. Riallenare un gruppo prima che sia recuperato interrompe la supercompensazione e porta al sovrallenamento. Persone diverse (e momenti diversi) recuperano a velocit\xE0 diverse.",how:"Il segnale oggettivo \xE8 il carico: se il peso che sollevavi non scende, sei recuperato e puoi riallenare quel gruppo; se scende o ti senti svuotato, aspetta un giorno in pi\xF9. Ascolta anche sonno, energia e articolazioni (vedi il check Prontezza)."},{key:"recupero",title:"Recupero Post-Seduta",tag:"Per lo stesso gruppo muscolare",color:"green",what:"I giorni indicati (es. 2-3 giorni) sono il tempo minimo prima di riallenare LO STESSO gruppo muscolare \u2014 cio\xE8 prima di rifare QUEL workout, non un altro.",why:"Ogni workout colpisce muscoli diversi (A: petto/schiena/addome, B: gambe, C: spalle/braccia). Mentre il gruppo di A recupera, puoi allenare B e C: sono muscoli diversi, non c'\xE8 conflitto.",how:"Puoi fare A il giorno 1, B il giorno 2, C il giorno 3, e poi ripartire da A quando \xE8 passato il suo recupero. Il recupero conta PER MUSCOLO, non blocca il calendario. Unica eccezione: dopo le gambe (specie col doppio giro) servono pi\xF9 giorni prima di rifare LE GAMBE, ma puoi comunque allenare la parte alta nel frattempo."},{key:"durata",title:"Durata Stimata",tag:"Tempo indicativo della seduta",color:"gray",what:"Una stima del tempo totale della seduta, calcolata dai tempi sotto tensione (TUT) di ogni esercizio + i recuperi realistici + riscaldamento e ramping.",why:"Serve a pianificare: il HIT \xE8 nato per essere efficiente. Se una seduta dura molto pi\xF9 del previsto, probabilmente stai recuperando troppo tra gli esercizi o aggiungendo volume non previsto.",how:"\xC8 un intervallo (min-max) perch\xE9 il ritmo di esecuzione e i transiti variano. Il tempo-macchina pu\xF2 essere breve anche quando la fatica \xE8 altissima (es. il giant set gambe): durata corta non significa seduta facile."},{key:"ct",title:"CT \u2014 Carico Target",tag:"Non \xE8 il tuo 1RM",color:"red",what:"Il peso pi\xF9 pesante con cui raggiungi il cedimento entro il range di ripetizioni previsto (es. 8), rispettando la cadenza lenta indicata.",why:"Il 100% della scheda NON \xE8 il massimale a 1 ripetizione (1RM). Il vero 1RM non va mai testato in questo protocollo: la cadenza lenta cambia la curva di forza e un test massimale comporta un rischio articolare sproporzionato.",how:"Si trova per approssimazioni successive nelle prime 1-2 sedute per esercizio: se il cedimento arriva oltre il range, aumenta il carico del 10-15% alla seduta dopo; se arriva prima, riducilo del 10-15%. Usa il tab 'Trova CT'."},{key:"rom",title:"ROM \u2014 Range of Movement",tag:"Escursione articolare",color:"sky",what:"L'ampiezza del movimento eseguito nell'esercizio. 'Completo' significa dalla massima estensione alla massima contrazione muscolare.",why:"Il ROM completo \xE8 richiesto nella fase di ramping/pre-attivazione per stimolare l'intera fibra muscolare. Le riduzioni di ROM (parziali, Zone Training) sono tecniche di intensificazione, applicate solo DOPO il cedimento a ROM completo \u2014 mai al posto di esso.",how:"Rispetta sempre il ROM indicato per l'esercizio. Se non riesci a completarlo con forma corretta, il carico \xE8 troppo alto."},{key:"tut",title:"TUT \u2014 Time Under Tension",tag:"Tempo sotto tensione",color:"amber",what:"Il tempo totale in cui il muscolo resta sotto carico durante una serie: cadenza (secondi per ripetizione) \xD7 numero di ripetizioni.",why:"Le target set dei grandi gruppi muscolari dovrebbero ricadere nella fascia di TUT intermedio (30-70 secondi), la finestra ottimale per l'ipertrofia miofibrillare. Dove il TUT supera i 70s per scelta (polpacci, curl con isometria), \xE8 intenzionale.",how:"Se il TUT stimato \xE8 molto pi\xF9 corto del previsto, probabilmente stai muovendo il peso pi\xF9 veloce della cadenza richiesta."},{key:"cadenza",title:"Cadenza (4 numeri)",tag:"Eccentrica\u2013Iso.bassa\u2013Concentrica\u2013Iso.alta",color:"indigo",what:"Quattro numeri in secondi, in quest'ordine: Eccentrica (discesa) \u2013 Isometria inferiore (pausa in massimo stiramento) \u2013 Concentrica (risalita) \u2013 Isometria superiore (pausa in massima contrazione). Es. 4-0-4-0 = 4s discesa, 0s pausa bassa, 4s salita, 0s pausa alta.",why:"La velocit\xE0 di esecuzione determina lo stimolo meccanico: rallentare elimina l'inerzia e obbliga le fibre contrattili a farsi carico dell'intero movimento, anzich\xE9 scaricare il lavoro su tendini e legamenti.",how:"Usa il Metronomo Cadenza nella scheda per rispettare esattamente i tempi prescritti \u2014 \xE8 la variabile pi\xF9 spesso ignorata e pi\xF9 determinante del protocollo."},{key:"cedimento",title:"Cedimento (vero)",tag:"L'obiettivo di ogni Target Set",color:"red",what:"Il punto in cui, rispettando forma e cadenza corrette, \xE8 fisicamente impossibile completare un'altra ripetizione.",why:"\xC8 l'intensit\xE0 estrema del cedimento concentrico \u2014 non il volume di serie \u2014 a stimolare l'ipertrofia in questo metodo. Fermarsi prima per timore vanifica la target set.",how:"Non fermarti alla fatica percepita: continua fino a che il movimento si blocca a met\xE0 corsa mantenendo la cadenza indicata."},{key:"brzycki",title:"1RM Stimato (Formula di Brzycki)",tag:"Solo un riferimento numerico",color:"gray",what:"1RM stimato = peso sollevato \xF7 (1,0278 \u2212 0,0278 \xD7 ripetizioni a cedimento). Es. 60kg per 8 rep \u2192 1RM stimato \u2248 74kg.",why:"Utile solo come ordine di grandezza per confronto con altri metodi. La formula \xE8 tarata su movimenti esplosivi standard: con la cadenza lenta dell'HIT il vero massimale sar\xE0 verosimilmente pi\xF9 basso di quanto suggerito.",how:"Non eseguire mai un vero test a 1 ripetizione massimale. Usa questo numero solo come riferimento, mai come guida per il carico da impostare in scheda."},{key:"progressione",title:"Progressione del Carico: manuale o automatica?",tag:"-10% / -5% / +5% / +10%",color:"emerald",what:"Ci sono due strumenti distinti in questa app. Nel Workout Planner, 'Test CT' serve a CALIBRARE il carico: testi una serie, inserisci le rep raggiunte, e l'app applica subito un aggiustamento (\xB110%) \u2014 ma non registra nulla nello storico. La vera progressione GUIDATA, che segue le rep sessione dopo sessione e costruisce lo storico, avviene solo in 'Allenati', quando esegui davvero il workout.",why:"La 'progressione doppia' del manuale (pag. 3) dice: superi il range di ripetizioni \u2192 aumenta il carico del 5-10% alla seduta dopo; resti sotto il range per 2 sedute consecutive \u2192 riduci del 5-10%; nel range \u2192 mantieni. Questa regola guida sia il Test CT nel Planner sia la progressione registrata in Allenati \u2014 cambia solo se il risultato finisce nello storico o resta un aggiustamento immediato.",how:"Nel Planner, usa 'Test CT' per trovare il carico giusto prima di allenarti sul serio: il peso trovato l\xEC \xE8 gi\xE0 pronto quando apri 'Allenati'. In 'Allenati', registra le rep a cedimento reali: quello \xE8 ci\xF2 che costruisce lo storico e i suggerimenti di progressione. Usa i pulsanti manuali (\xB15/10%) solo se vuoi intervenire di tua iniziativa, indipendentemente dal test o dal log."},{key:"deload",title:"Settimana di Scarico (Deload)",tag:"Ogni 8-12 settimane",color:"purple",what:"Una settimana con un solo allenamento leggero, a carichi ridotti (50-60% del CT) e senza mai andare a cedimento.",why:"Il programma \xE8 sostenibile per 8-12 settimane di lavoro progressivo. Dopo questo periodo, o quando la progressione si ferma su pi\xF9 esercizi contemporaneamente, il sistema nervoso e le articolazioni hanno bisogno di un recupero completo prima di riprendere a spingere sui carichi.",how:"Un solo allenamento nella settimana (non tre), con tutti i carichi intorno al 55% del CT attuale, cadenza rispettata ma fermandoti sempre con margine, mai a cedimento. Poi riparti il ciclo da zero."}],Fv=Object.fromEntries(aq.map(e=>[e.key,e])),rq=(0,c.createContext)(()=>{});function Gv(){return(0,c.useContext)(rq)}function Du({termKey:e,label:t,style:a}){let r=Gv();return Fv[e]?c.default.createElement("button",{type:"button",onClick:()=>r(e),title:"Tocca per la spiegazione",className:`group inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-md border cursor-pointer ring-1 ring-inset ring-current/20 hover:ring-current/50 hover:brightness-95 active:scale-95 transition-all ${a}`},t,c.default.createElement(Et,{className:"w-2.5 h-2.5 opacity-60 group-hover:opacity-100 shrink-0"})):c.default.createElement("span",{className:`text-[10px] font-bold px-2 py-0.5 rounded-md border ${a}`},t)}function ka({termKey:e,children:t,className:a="",underline:r=!0}){let n=Gv();return Fv[e]?c.default.createElement("button",{type:"button",onClick:()=>n(e),title:"Tocca per la spiegazione",className:`group cursor-pointer inline-flex items-baseline gap-0.5 hover:text-indigo-700 transition-colors ${r?"underline decoration-dotted decoration-slate-400 underline-offset-2 hover:decoration-slate-700":"underline decoration-dotted decoration-slate-300/70 underline-offset-4 hover:decoration-slate-500"} ${a}`},t,c.default.createElement(Et,{className:"w-3 h-3 self-center opacity-40 group-hover:opacity-90 shrink-0 text-indigo-500"})):c.default.createElement("span",{className:a},t)}function _u({exerciseId:e,variantName:t,children:a,className:r="",underline:n=!0}){let i=Gv();if(!e)return c.default.createElement("span",{className:r},a);let o=t?`exv:${e}:${encodeURIComponent(t)}`:`ex:${e}`;return c.default.createElement("button",{type:"button",onClick:()=>i(o),title:"Tocca per i dettagli di esecuzione Il tuo compito \xE8 guidare l'utente nei suoi allenamenti Heavy Duty e Ibrido HD-ZT.
Fornisci risposte precise, professionali, motivate fisiologicamente e dirette, nello stile di un coach esigente ma attento alla sicurezza, al recupero e al rigore scientifico.
Usa l'italiano come lingua principale (puoi usare l'inglese se richiesto).

Fai rigorosamente riferimento alle regole del manuale:
1. CT (Carico Target) NON \xE8 il massimale a 1 ripetizione (1RM). \xC8 il peso pi\xF9 pesante con cui l'utente raggiunge il cedimento entro il range di ripetizioni previsto (es. 8 ripetizioni), rispettando la cadenza lenta indicata. Il vero 1RM non va mai testato!
2. Cadenza lenta \xE8 LEGGE (es. 4-0-4-0 per Chest Press, 3-1-3-0 per Squat, 4-2-4-2 per Polpacci). La velocit\xE0 di esecuzione determina lo stimolo meccanico.
3. Volume minimo: ogni gruppo muscolare riceve UNA SOLA serie realmente allenante (Target Set) portata al cedimento, preceduta da ramping e pre-attivazioni. Se l'utente fa pi\xF9 di una serie allenante, sta sbagliando.
4. Struttura dei Workout: A) Petto, Schiena, Addome \u2014 3 target set. B) Gambe \u2014 1 giant set esteso a 7 stazioni senza recupero, devastante, richiede almeno 3 giorni pieni di riposo. C) Spalle, Bicipiti, Tricipiti \u2014 5 target set.
5. Progressione doppia: se superi il limite superiore del range a cadenza corretta, aumenta il carico del 5-10% alla seduta successiva. Se resti sotto il limite inferiore per 2 sedute, riduci del 5-10%.
6. Come trovare il CT: nelle prime 1-2 sedute scegli un peso stimato. Se il cedimento arriva prima del range, riduci del 10-15%. Se arriva dopo, aumenta del 10-15%.
7. Spiega le varianti (es. Croci ai cavi bassi per petto alto, Hack squat/Pressa 45\xB0 per minor carico lombare, Leg Extension punte intraruotate per vasto laterale) per evitare l'assuefazione neurale.
