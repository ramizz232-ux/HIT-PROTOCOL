linea del petto), ma richiede pi\xF9 stabilizzazione della spalla \u2014 coerente con Muscle Law: maggiore libert\xE0 di movimento, minor carico gestibile in sicurezza a parit\xE0 di sforzo percepito."},pett_spinte_incl_man:{setup:"Panca inclinata 30-45\xB0, manubri liberi, stessa meccanica della spinta piana ma su piano inclinato.",whatChanges:"Sposta l'enfasi sulle fibre alte/clavicolari rispetto alla versione piana, con lo stesso vantaggio di ROM libero dei manubri rispetto al Multipower."},pett_spinte_decl_man:{setup:"Panca declinata 15-30\xB0, manubri liberi, gomiti che scendono sotto la linea del busto.",whatChanges:"Enfasi sulla porzione bassa/costale del pettorale, la meno colpita dalle altre inclinazioni."},pett_croci_piana_man:{setup:"Sdraiato su panca piana, manubri con leggera flessione del gomito fissa per tutto il movimento, apertura fino a sentire lo stiramento del petto.",whatChanges:"Isolamento puro del pettorale senza il contributo del tricipite, a differenza delle pressioni; tensione minima nel punto pi\xF9 basso del ROM (a differenza dei cavi, dove \xE8 costante)."},pett_croci_incl_man:{setup:"Panca inclinata 30\xB0, stesso movimento delle croci piane con manubri.",whatChanges:"Sposta l'enfasi sulle fibre clavicolari/alte, complementare alla versione piana."},pett_croci_bassi:{setup:"Pulley posizionate in basso, movimento dal basso verso l'alto e verso il centro.",whatChanges:"Sposta l'enfasi sulle fibre alte/clavicolari del pettorale; tensione costante ai cavi lungo tutto il movimento, a differenza dei manubri."},pett_croci_medi:{setup:"Pulley all'altezza del petto, movimento orizzontale puro verso il centro.",whatChanges:"Enfasi bilanciata sull'intero pettorale, allineata al motore principale della pressa; tensione costante tipica dei cavi."},pett_chest_press_conv:{setup:"Macchina con bracci che convergono a fine corsa (tipica Panatta/Matrix), presa media.",whatChanges:"Traiettoria che segue la naturale contrazione di picco del gran pettorale, extra spremitura sulla porzione sternale rispetto alla traiettoria orizzontale pura."},pett_power_smith_incl:{setup:"Schienale regolato su inclinazione medio-bassa, carrelli indipendenti caricati a dischi, presa media, spinta verso l'alto.",whatChanges:"Traiettoria convergente guidata ma con carrelli indipendenti (iso-laterale): pi\xF9 stabilizzazione e ROM di un manubrio libero, pi\xF9 sicurezza del Multipower. Enfasi sul petto alto."},pett_pec_deck:{setup:"Seduto, gomiti sui braccioli imbottiti, movimento di chiusura frontale guidato dalla camma.",whatChanges:"Isolamento puro guidato dalla camma, zero richiesta di stabilizzazione: ottimo quando le spalle sono gi\xE0 affaticate da altri esercizi."},pett_dist_piana_mp:{setup:"Piano orizzontale sul Multipower, bilanciere guidato su binario verticale fisso.",whatChanges:"Sposta l'enfasi sulla porzione medio-sternale invece che clavicolare rispetto alla versione inclinata; guida verticale che riduce la richiesta di stabilizzazione, coerente con Muscle Law: maggiore stabilit\xE0, maggiore carico esprimibile a parit\xE0 di ROM."},schi_trazioni_supina:{setup:"Presa supina (palmi verso il viso), larghezza spalle, dead hang di partenza.",whatChanges:"Il bicipite, pi\xF9 coinvolto nella presa supina, assiste maggiormente la trazione: pi\xF9 accessibile della presa prona ma con minor isolamento del dorsale puro."},schi_trazioni_neutra:{setup:"Presa neutra (palmi che si guardano, su maniglie parallele), larghezza spalle.",whatChanges:"Angolazione di polso e gomito pi\xF9 naturale, minor stress articolare rispetto a prona/supina, buon compromesso di coinvolgimento dorsale/bicipite."},schi_tbar_row:{setup:"Busto flesso a circa 45\xB0, bilanciere ancorato a terra a un'estremit\xE0, presa sulla maniglia a V o larga.",whatChanges:"Movimento di tirata orizzontale a catena chiusa: enfasi sullo spessore del dorso con un ROM leggermente pi\xF9 corto ma un picco di tensione meccanica elevato."},schi_rematore_1man_piana:{setup:"Un ginocchio e una mano appoggiati alla panca, busto parallelo al pavimento, manubrio tirato verso il fianco.",whatChanges:"Lavoro unilaterale che permette di correggere asimmetrie tra i due lati, con un ROM libero superiore alle versioni bilaterali guidate."},schi_trazioni_assistite:{setup:"Macchina con contrappeso o pedana che assiste la trazione, stessa meccanica delle trazioni libere.",whatChanges:"Permette di dosare con precisione l'assistenza per restare in un range di ripetizioni gestibile, utile finch\xE9 le trazioni libere non sono ancora accessibili in autonomia."},schi_super_high_row:{setup:"Seduto, maniglie alte, tirata verso il basso e indietro con gomiti che scendono lungo i fianchi.",whatChanges:"Angolazione alta della trazione che enfatizza il dorsale superiore e il trapezio medio, con la sicurezza della traiettoria guidata Panatta."},schi_chest_supported_row:{setup:"Petto appoggiato al cuscinetto inclinato, tirata verso il busto con manopole o barra.",whatChanges:"L'appoggio del petto elimina completamente il compenso lombare, isolando il dorso dal lavoro di stabilizzazione della zona bassa della schiena."},schi_pulley_ombelico:{setup:"Seduto, cavo basso, tirata orizzontale verso l'ombelico con busto verticale.",whatChanges:"Isolamento del dorso in spessore con tensione costante ai cavi, senza il contributo di gambe/schiena tipico del T-Bar o del rematore a busto flesso."},schi_pulley_petto:{setup:"Seduto, cavo basso, tirata orizzontale verso il petto con gomiti alti.",whatChanges:"Sposta l'enfasi verso il trapezio medio e i romboidi rispetto alla tirata all'ombelico, per la retrazione scapolare pi\xF9 marcata."},schi_pulldown_braccia_tese:{setup:"In piedi o seduto, braccia quasi tese, tirata dall'alto verso il basso mantenendo il gomito con leggera flessione fissa.",whatChanges:"Vero isolamento a singola articolazione (solo la spalla si muove, non il gomito): a differenza della Lat Machine classica, elimina quasi del tutto il contributo del bicipite."},schi_rematore_busto_flesso_mp:{setup:"Busto flesso a circa 45\xB0 sotto la barra del Multipower, tirata verso l'addome basso.",whatChanges:"La guida verticale del Multipower riduce la richiesta di stabilizzazione lombare rispetto al bilanciere libero, permettendo di concentrarsi sulla tirata."},gamb_leg_press_45:{setup:"Pedana a 45\xB0, piedi centrali larghezza spalle, spinta senza bloccare le ginocchia in alto.",whatChanges:"Traiettoria inclinata guidata: permette carichi elevati con richiesta di equilibrio quasi nulla rispetto allo squat libero."},gamb_affondi_manubri:{setup:"Un manubrio per mano, affondo in avanti/indietro o camminato alternando le gambe.",whatChanges:"Lavoro unilaterale che corregge asimmetrie e richiede pi\xF9 equilibrio rispetto ai movimenti bilaterali su macchina; attrezzo a basso controllo, valuta l'avviso di sicurezza se usato come target."},gamb_stacco_rumeno_man:{setup:"Manubri davanti alle cosce, schiena piatta, anche che arretrano in flessione fino a sentire lo stiramento dei femorali.",whatChanges:"Coinvolge femorali e glutei in catena cinetica posteriore completa, con un ROM e uno stiramento maggiori del Leg Curl isolato; attrezzo a basso controllo, valuta l'avviso di sicurezza se usato come target."},gamb_leg_press_orizz:{setup:"Macchina leg press a slitta orizzontale invece che inclinata a 45\xB0.",whatChanges:"Curva di resistenza diversa rispetto alla pressa inclinata, con minor coinvolgimento della zona lombare."},gamb_power_squat:{setup:"Guida verticale a contrappesi indipendenti, piedi larghezza spalle, discesa fino a coscia parallela.",whatChanges:"Stessa meccanica dello squat libero ma su binario guidato: massimizza il carico gestibile in sicurezza, coerente con Muscle Law sui macchinari a traiettoria vincolata."},gamb_pendulum_squat:{setup:"Schienale mobile su un arco pendolare, spinta con le gambe contro il carico a dischi.",whatChanges:"La traiettoria ad arco segue naturalmente la biomeccanica del ginocchio, riducendo lo stress di taglio rispetto allo squat verticale puro."},gamb_leg_curl_sdraiato:{setup:"Prono sulla panca, caviglie sotto il rullo imbottito, flessione del ginocchio verso i glutei.",whatChanges:"Maggior stiramento del femorale in partenza rispetto alla versione seduta, con una curva di resistenza diversa."},gamb_affondi_inversi_mp:{setup:"Bilanciere sul Multipower sui trapezi, passo indietro in affondo, guida verticale fissa.",whatChanges:"La guida del Multipower elimina la componente di equilibrio in avanti/indietro tipica dell'affondo libero, permettendo di isolare meglio lo sforzo sulle gambe."},gamb_hip_thrust_mp:{setup:"Schiena appoggiata a panca, bilanciere sul bacino guidato dal Multipower, spinta in estensione d'anca.",whatChanges:"Isolamento diretto del grande gluteo con traiettoria guidata: a differenza di squat e leg press, qui il gluteo \xE8 motore primario in tutto il ROM."},gamb_hip_thrust_machine:{setup:"Macchina dedicata con schienale e cuscinetto sul bacino, resistenza a pacco pesi, spinta in estensione d'anca.",whatChanges:"Setup immediato (nessun bilanciere da caricare) e incrementi di carico rapidi grazie al pacco pesi: la scelta pi\xF9 pratica quando vuoi cambiare peso velocemente tra le serie."},gamb_hip_thrust_plate:{setup:"Macchina dedicata caricata a dischi, cuscinetto sul bacino, spinta in estensione d'anca.",whatChanges:"Curva di resistenza tipica delle macchine a dischi e carichi massimi generalmente pi\xF9 alti del pacco pesi, mantenendo la traiettoria guidata."},gamb_calf_raise_piedi_mp:{setup:"In piedi sotto la barra del Multipower, spinta sulle punte dei piedi con massima estensione della caviglia.",whatChanges:"Coinvolge principalmente il gastrocnemio (bipennato, attivo a ginocchio esteso)."},gamb_calf_raise_seduto_mp:{setup:"Seduto, ginocchia flesse a 90\xB0, spinta sulle punte dei piedi contro il carico.",whatChanges:"A ginocchio flesso il gastrocnemio \xE8 meno efficace: sposta l'enfasi sul soleo, il muscolo profondo del polpaccio."},gamb_calf_raise_mono_mp:{setup:"Stessa meccanica del calf raise in piedi, ma una gamba alla volta.",whatChanges:"Permette di correggere asimmetrie tra i due lati e di raggiungere un carico relativo maggiore per gamba a parit\xE0 di peso totale."},spal_lento_man_seduto:{setup:"Seduto, schienale verticale, manubri liberi portati a livello delle spalle, spinta verso l'alto.",whatChanges:"ROM libero e traiettoria naturale della spalla rispetto al Multipower guidato, ma richiede pi\xF9 stabilizzazione; attrezzo a basso controllo, valuta l'avviso di sicurezza se usato come target."},spal_alzate_frontali_man:{setup:"In piedi, manubri sollevati frontalmente fino all'altezza delle spalle, leggera flessione del gomito fissa.",whatChanges:"Isolamento del fascio anteriore, movimento libero rispetto al cavo; attrezzo a basso controllo, valuta l'avviso di sicurezza se usato come target."},spal_alzate_frontali_cavo:{setup:"Pulley bassa, barra sollevata frontalmente fino all'altezza delle spalle.",whatChanges:"Tensione costante ai cavi lungo tutto il movimento, a differenza dei manubri dove il carico scarica in alcuni punti del ROM."},spal_alzate_laterali_cavo:{setup:"Un braccio alla volta alla pulley bassa, cavo che attraversa il corpo, sollevamento laterale.",whatChanges:"Tensione costante e uniforme lungo tutto l'arco di movimento, specialmente a inizio corsa, dove i manubri liberi non tensionano quasi."},spal_shoulder_press_machine:{setup:"Seduto, maniglie a livello delle spalle, spinta verso l'alto guidata dalla macchina.",whatChanges:"Traiettoria fissa che elimina la richiesta di stabilizzazione: alternativa sicura al lento con manubri o Multipower."},spal_shoulder_press_plate:{setup:"Seduto, leve caricate a dischi indipendenti, spinta verso l'alto su traiettoria guidata.",whatChanges:"Come la Shoulder Press Machine ma con leve indipendenti (iso-laterale): corregge asimmetrie tra i due lati mantenendo la sicurezza della traiettoria guidata."},spal_power_smith_vert:{setup:"Schienale verticale, carrelli indipendenti caricati a dischi, spinta verso l'alto su binario guidato.",whatChanges:"Stabilit\xE0 del Multipower con l'indipendenza dei due lati tipica dei manubri: corregge asimmetrie senza perdere sicurezza."},spal_lateral_raise_machine:{setup:"Seduto, gomiti sui braccioli imbottiti, sollevamento laterale guidato dalla camma.",whatChanges:"Resistenza guidata costante lungo tutto il ROM, utile se i polsi affaticano con i manubri liberi."},spal_reverse_fly_pec_deck:{setup:"Seduto fronte al cuscinetto, apertura posteriore delle braccia contro la resistenza della macchina.",whatChanges:"Isolamento del deltoide posteriore guidato dalla camma, senza il contributo dell'equilibrio richiesto dalle alzate posteriori con manubri."},bici_curl_alt_man:{setup:"In piedi o seduto, manubri, curl alternando i due bracci o simultaneo.",whatChanges:"ROM libero e possibilit\xE0 di supinare progressivamente il polso durante la salita, enfatizzando il capo breve."},bici_curl_concentrato:{setup:"Seduto, gomito appoggiato contro l'interno coscia, curl a un braccio con isolamento massimo.",whatChanges:"Massima concentrazione mentale e isolamento del bicipite, nessun compenso possibile grazie all'appoggio del gomito."},bici_hammer_curl:{setup:"In piedi o seduto, manubri con presa neutra (a martello), curl senza rotazione del polso.",whatChanges:"Sposta l'enfasi dal bicipite verso il brachiale e il brachioradiale (avambraccio) rispetto al curl supino classico."},bici_curl_incl_man:{setup:"Seduto su panca inclinata 45-60\xB0, braccia che pendono dietro la linea del busto, curl con manubri.",whatChanges:"Copre il capo lungo del bicipite (il picco esterno): questa posizione mette il capo lungo in massimo allungamento, dove lavora di pi\xF9."},bici_incline_hammer:{setup:"Stessa panca inclinata del curl incline, ma con presa neutra (a martello).",whatChanges:"Combina lo stiramento del capo lungo tipico della panca inclinata con l'enfasi su brachiale/brachioradiale della p ori su panca inclinata (petto appoggiato)",role:"Target Set",equipment:"Manubri",seriesCount:1,repsRange:"10-12 + 6 parziali + isometria",rom:"Completo poi parziale",cadence:"3-1-3-1",percentageText:"100% CT specifico",percentageValue:100,tutEstimated:"~80-96s + parziali + isometria",techniqueNote:"Esercizio dedicato, eseguito singolarmente a fine spalle. Petto appoggiato a panca inclinata 30\xB0, apertura laterale e indietro con leggera flessione del gomito. Pausa di 1s in massima retrazione scapolare. Fascio piccolo e spesso sotto-allenato: richiede spesso qualche rep in pi\xF9 (10-12). Al cedimento a ROM completo, senza recupero, esegui 6 rep parziali nella zona di massima apertura/retrazione. Sull'ultima parziale possibile, blocca le braccia in massima retrazione e resisti il pi\xF9 a lungo possibile.",techniqueMeta:{type:"target",toFailure:!0,hybrid:{fullRomLabel:"Rep complete",partialLabel:"Rep parziali (apertura/retrazione, 'a pistone')",partialRange:"6"},terminalIsometric:!0}},{id:"c4",name:"Pushdown al cavo alto con corda",role:"Pre-attivazione",equipment:"Cavi",seriesCount:1,repsRange:"10-12",rom:"Completo, gomiti fissi ai fianchi",cadence:"3-0-3-0",percentageText:"45-55% CT",percentageValue:50,tutEstimated:"~60-72s",techniqueNote:"Gomiti fissi ai fianchi per tutto il movimento, angolo gomito-busto vicino a 0\xB0 \u2014 se i gomiti si allontanano dal corpo, il lavoro si sposta su petto e spalle. Busto leggermente inclinato in avanti (10-15\xB0), spingi la corda verso il basso fino a estensione completa allontanando le mani a fine corsa per la contrazione di picco. Nessun cedimento: serve solo a pre-affaticare e irrorare di sangue il capo laterale.",techniqueMeta:{type:"preattivazione",toFailure:!1}},{id:"c5",name:"Estensioni sopra la testa al cavo basso con corda (di spalle alla carrucola)",role:"Pre-attivazione",equipment:"Cavi",seriesCount:1,repsRange:"10-12",rom:"Completo, massimo stiramento dietro nuca",cadence:"3-1-3-0",percentageText:"45-55% CT",percentageValue:50,tutEstimated:"~70-84s",techniqueNote:"Di spalle alla pulley bassa, corda dietro la testa con entrambe le mani, gomiti puntati in alto e fissi vicino alle orecchie \u2014 la parte superiore del braccio non si muove, solo l'avambraccio. Estendi portando la corda in avanti/alto fino a quasi distendere il gomito. Questa angolazione mette in forte stiramento il capo lungo del tricipite, che origina dalla scapola (anello debole che il Pushdown non raggiunge \u2014 Muscle Law sull'importanza di isolare l'anello debole della catena cinetica). Pausa di 1s in massimo stiramento.",techniqueMeta:{type:"preattivazione",toFailure:!1}},{id:"c6",name:"Panca piana a presa stretta al Multipower",role:"Target Set",equipment:"Multipower",seriesCount:1,repsRange:"8 + 4 + max",rom:"Completo, gomiti stretti ai fianchi",cadence:"4-0-4-0",percentageText:"100% \u2192 75% \u2192 55% CT",percentageValue:100,tutEstimated:"~64s + stripping",techniqueNote:"Impugnatura poco pi\xF9 stretta della larghezza spalle (25-30cm tra le mani). I gomiti scivolano vicino ai fianchi in discesa (angolo gomito-busto di circa 30-40\xB0) anzich\xE9 aprirsi verso l'esterno \u2014 \xE8 questo che sposta il lavoro dal pettorale al tricipite. Discesa fino a sfiorare lo sterno, risalita senza bloccare i gomiti. Stripping (doppio drop set): cedimento a 100%, scala al 75%, cedi, scala al 55%, cedi.",techniqueMeta:{type:"target",toFailure:!0,stripping:[{pct:75,label:"Drop 1"},{pct:55,label:"Drop 2"}]}},{id:"c7",name:"Chest Press a presa stretta",role:"Rifinitura",equipment:"Macchina",seriesCount:1,repsRange:"max",rom:"Completo",cadence:"3-0-3-0",percentageText:"35-45% CT",percentageValue:40,tutEstimated:"Variabile",techniqueNote:"Stessa logica della Chest Press usata per il petto, ma con gomiti stretti ai fianchi durante tutta l'esecuzione (angolo gomito-busto di circa 20-30\xB0, molto pi\xF9 chiuso che nella versione petto) per isolare ulteriormente il tricipite. A questo punto il muscolo \xE8 quasi esauri ntageText:"100% CT",percentageValue:100,tutEstimated:"~60s",techniqueNote:"Solo elevazione verticale delle spalle verso le orecchie (traiettoria dritta, non circolare): niente rotazione delle spalle (inutile e rischiosa). Parti da spalle rilassate e sali portando le scapole il pi\xF9 vicino possibile alle orecchie, senza flettere i gomiti. Pausa 1s in massima contrazione in alto, discesa controllata fino al completo allungamento del trapezio.",techniqueMeta:{type:"target",toFailure:!0}},{id:"x4",name:"Wrist curl (curl del polso)",role:"Flessori dell'avambraccio",equipment:"Bilanciere",seriesCount:1,repsRange:"12-15",rom:"Completo del polso",cadence:"2-0-2-1",percentageText:"100% CT",percentageValue:100,tutEstimated:"~60-75s",techniqueNote:"Avambracci appoggiati su panca o cosce, polso libero di muoversi oltre il bordo, solo i polsi si muovono (angolo di flessione, circa 60-70\xB0 di escursione totale). Presa in supinazione, palmo verso l'alto. Isometria 1s in massima contrazione.",techniqueMeta:{type:"target",toFailure:!0}},{id:"x10",name:"Wrist curl inverso (curl del polso)",role:"Estensori dell'avambraccio",equipment:"Bilanciere",seriesCount:1,repsRange:"12-15",rom:"Completo del polso",cadence:"2-0-2-1",percentageText:"100% CT specifico",percentageValue:100,tutEstimated:"~60-75s",techniqueNote:"Stessa posizione del wrist curl diretto, ma presa in pronazione (palmo verso il basso): solleva il bilanciere estendendo il polso verso l'alto. Gli estensori sono pi\xF9 deboli dei flessori \u2014 usa un carico nettamente pi\xF9 leggero (spesso 30-50% del wrist curl diretto) e non forzare. Utile per prevenire l'epicondilite del gomito, frequente quando si allenano solo i flessori.",techniqueMeta:{type:"target",toFailure:!0}},{id:"x5",name:"Face Pull al cavo alto con corda",role:"Deltoide posteriore + retrattori scapolari",equipment:"Cavi",seriesCount:1,repsRange:"12-15",rom:"Completo, extrarotazione a fine corsa",cadence:"2-1-2-1",percentageText:"100% CT specifico",percenta  sottoscapolare (rotatori interni)",equipment:"Cavi",seriesCount:1,repsRange:"12-15",rom:"Completo, rotazione interna dell'omero",cadence:"2-1-2-1",percentageText:"Carico molto leggero",percentageValue:100,tutEstimated:"~75s",techniqueNote:"Cavo basso/medio, piccolo rullo o asciugamano arrotolato tra gomito e fianco per impedire l'abduzione involontaria e centrare la testa dell'omero nella cavit\xE0 glenoidea. Tensione costante ai cavi, priva di picchi inerziali: evita che il gran pettorale rubi il lavoro al sottoscapolare target. Carico volutamente minimo.",techniqueMeta:{type:"target",toFailure:!1}},{id:"x8",name:"Scapolari ai cavi alti",role:"Retrattori scapolari / cuffia dei rotatori",equipment:"Cavi",seriesCount:1,repsRange:"12-15",rom:"Completo, retrazione scapolare pura senza flettere i gomiti",cadence:"2-1-2-1",percentageText:"Carico leggero",percentageValue:100,tutEstimated:"~75s",techniqueNote:"Alla pulley alta o media, braccia quasi tese (gomiti a circa 160-170\xB0, leggermente morbidi), il movimento parte ESCLUSIVAMENTE dalla scapola (la si 'chiude' verso la colonna) senza flettere i gomiti come in una trazione. Pausa 1s in massima retrazione. Lavora in sinergia con il Face Pull e il Sovraspinato per la salute generale della spalla.",techniqueMeta:{type:"target",toFailure:!1}},{id:"x13",name:"Push-up Plus / Scapular Push-up",role:"Serrato anteriore",equipment:"Corpo Libero",seriesCount:1,repsRange:"12-15",rom:"Completo, protrazione scapolare pura",cadence:"2-1-2-1",percentageText:"Corpo libero",percentageValue:100,tutEstimated:"~75s",techniqueNote:"Posizione di plank o push-up con braccia tese, permetti alle scapole di avvicinarsi (il petto scende leggermente tra le braccia) poi spingile via allontanandole il pi\xF9 possibile (protrazione), senza flettere i gomiti. Catena cinetica chiusa a corpo libero: isola la protrazione scapolare pura senza sovraccaricare l'articolazione acromio-claveare o il deltoide anteriore.",techniqueMeta:{type:"target",toFailur pi\xF9.",how:"10-12 rep controllate, fermarsi sempre un po' prima del cedimento vero. Nessuna pausa prima del prossimo esercizio se \xE8 un pre-esaurimento diretto."},{key:"target",title:"Target Set (cedimento vero)",tag:"Il vero stimolo",color:"red",what:"L'UNICA serie realmente allenante per gruppo muscolare, portata al vero cedimento concentrico: l'ultima ripetizione deve essere impossibile da completare in forma corretta.",why:"\xC8 il principio cardine del metodo: un volume minimo ma un'intensit\xE0 massima genera lo stimolo ipertrofico, evitando il sovrallenamento.",how:"Rispetta la cadenza fino all'ultima rep. Non fermarti prima per timore: il cedimento tecnico \xE8 l'obiettivo, non un incidente."},{key:"stripping",title:"Stripping (Drop Set)",tag:"Estensione del cedimento",color:"orange",what:"Dopo il cedimento al 100% del CT, si riduce il carico del 20-25% e si continua SENZA RECUPERO fino a un nuovo cedimento, ripetendo 1-2 volte.",why:"Estende la serie oltre il primo cedimento, reclutando ulteriori unit\xE0 motorie quando le prime sono gi\xE0 esaurite.",how:"Zero secondi di recupero tra un'onda e l'altra \u2014 solo il tempo di scalare il peso. Il carico continua a scendere, non risalire."},{key:"hybrid",title:"Ibrido HD/ZT (parziali in zona)",tag:"Heavy Duty + Zone Training",color:"purple",what:"Dopo il cedimento a ROM completo (stile Heavy Duty), si continua IMMEDIATAMENTE con ripetizioni parziali 'a pistone' in una porzione ridotta del movimento (stile Zone Training di Brian Johnston).",why:"La fase HD recluta le fibre rapide con tensione meccanica; la fase ZT le satura di sangue (ischemia locale), massimizzando la sintesi proteica in un'unica serie.",how:"Cedimento vero a ROM completo, poi senza pausa alcuna mezze ripetizioni continue nella zona di massimo accorciamento (o stiramento, a seconda dell'esercizio) fino a cedimento assoluto."},{key:"terminalIsometric",title:"Isometria Terminale",tag:"Picco isometrico",color:"indigo",what:"Al cedimento concentrico, invece di terminare la serie, si mantiene il carico fermo in massima contrazione (es. curl a 90\xB0) per il massimo tempo possibile.",why:"Massimizza il danno strutturale controllato sulle fibre gi\xE0 sotto tensione, oltre il limite del movimento dinamico.",how:"Appena non riesci pi\xF9 a completare la fase concentrica, blocca il peso nella posizione raggiunta e resisti il pi\xF9 a lungo possibile prima di cedere."},{key:"peakContraction",title:"Peak Contraction",tag:"Contrazione di picco",color:"teal",what:"Al termine della fase concentrica di OGNI ripetizione si contrae volontariamente il muscolo per 1-2 secondi, con un breve fermo isometrico, prima di iniziare la discesa.",why:"Enfatizza la fase di massimo accorciamento del muscolo, dove la tensione tende naturalmente a calare: aumenta il reclutamento proprio nel punto in cui il movimento sarebbe pi\xF9 facile. Utile per intensificare senza toccare il carico.",how:"Su ogni ripetizione, arrivato al culmine del movimento, stringi volontariamente il muscolo per 1-2 secondi prima di scendere. Aspettati di dover usare un carico inferiore al solito: \xE8 normale e voluto, il lavoro lo fa la contrazione."},{key:"pausedReps",title:"Ripetizioni con Fermo",tag:"Pausa isometrica",color:"cyan",what:"Brevi pause isometriche (2-3 secondi) inserite in un punto preciso di ogni ripetizione: a fine eccentrica, oppure a met\xE0 del movimento.",why:"Il fermo elimina rimbalzi, slanci e l'effetto elastico del riflesso miotattico, obbligandoti a usare un carico realmente controllabile. A fine eccentrica annulla il rimbalzo; a met\xE0 movimento carica la zona pi\xF9 difficile, quella da cui di solito si 'scappa' velocemente.",how:"Scegli il punto (basso o met\xE0) e mantienilo per 2-3 secondi su ogni ripetizione, senza mai perdere la tensione. Se non riesci a fermarti in modo controllato, il carico \xE8 troppo alto."},{key:"continuousTension",title:"Tensione Continua",tag:"Nessun lock-out",color:"lime",what:"Esecuzione priva della fase di blocco articolare (lock-out) a fine corsa, con cadenza medio-lenta e movimento fluido e ininterrotto.",why:"Nel lock-out il carico si scarica sull'articolazione e il muscolo riposa per un istante. Eliminandolo, la tensione resta sul muscolo per tutta la durata della serie, aumentando lo stress metabolico a parit\xE0 di carico e ripetizioni.",how:"Fermati poco prima dell'estensione completa e riparti subito, senza pause. Il movimento deve essere continuo e fluido: se senti che il peso 'si appoggia' in qualche punto, non stai pi\xF9 in tensione continua."},{key:"superset",title:"Superserie di Pre-esaurimento Inverso",tag:"Due esercizi, zero pausa",color:"pink",what:"Due target set consecutivi sullo stesso gruppo muscolare, eseguiti senza alcun recupero tra loro (es. Lento al Multipower \u2192 Alzate Laterali).",why:"Il movimento multiarticolare pesante viene prima; l'isolamento subito dopo colpisce il fascio gi\xE0 parzialmente affaticato da un'angolazione diversa.",how:"Appena raggiunto il cedimento nel primo esercizio, passa immediatamente al secondo \u2014 zero secondi, nessuna pausa per recuperare fiato."},{key:"giantSet",title:"Giant Set (solo Workout B \u2014 Gambe)",tag:"Pi\xF9 esercizi, un'unica ondata",color:"emerald",what:"Sette esercizi per le gambe eseguiti in sequenza, con 45-60s di recupero tra una stazione e l'altra, dal multiarticolare pesante fino ai piccoli isolamenti.",why:"Non \xE8 una serie di superserie separate: \xE8 un'unica ondata di fatica progressiva su tutta la muscolatura di coscia e anca. Il breve recupero tra le stazioni permette di cambiare macchina e ricomporsi senza raffreddare completamente il sistema.",how:"Prepara mentalmente il percorso tra le 7 macchine prima di iniziare. Riscaldamento generale + ramping allo squat obbligatori prima di partire. Richiede almeno 3 giorni pieni di recupero dopo."},{key:"rifinitura",title:"Rifinitura / Chiusura",tag:"Cedimento a carico ridotto",color:"gray",what:"Un ultimo esercizio a carico contenuto (35-45% CT), eseguito quando il muscolo \xE8 gi\xE0 quasi esausto da stripping o pre-attivazioni precedenti.",why:"Il muscolo target \xE8 gi\xE0 praticamente esaurito: non serve un carico alto per raggiungere il cedimento e 'chiudere' completamente lo stimolo.",how:"Esegui a cedimento con il carico ridotto indicato, senza cercare di alzare il peso \u2014 la fatica accumulata fa il lavoro."},{key:"copertura",title:"Copertura Muscolare (zone)",tag:"Allena tutte le aree del muscolo",color:"amber",what:"Molti muscoli hanno pi\xF9 aree/fibre con orientamenti diversi (es. il petto ha porzione alta, media, bassa; le spalle anteriore, laterale, posteriore). Ogni esercizio o variante enfatizza una zona specifica.",why:"Allenare sempre la stessa zona lascia le altre sotto-stimolate e crea sviluppo squilibrato. L'obiettivo \xE8 che, tra gli esercizi di un workout, ogni zona del muscolo riceva stimolo \u2014 senza per\xF2 ridondare (due esercizi sulla stessa zona sono uno sprecato).",how:"Il pannello Copertura mostra quali zone sono coperte (\u2713 verde) e quali no (\u25CB ambra) in base alle varianti attive. Se manca una zona, tocca 'Applica' per impostare la variante che la copre. Nota: se un gruppo ha meno esercizi che zone (es. 1 solo esercizio bicipiti), le zone si coprono ruotando la variante tra un ciclo e l'altro, non nella stessa seduta."},{key:"livello",title:"Livello \u2014 Intermedio / Avanzato",tag:"A chi \xE8 adatto",color:"gray",what:"Questo protocollo richiede la capacit\xE0 di portare una serie al vero cedimento muscolare con tecnica corretta, e di gestire tecniche di intensit\xE0 (stripping, Zone Training, isometrie).",why:"Il HIT vive sul cedimento reale: un principiante spesso non sa ancora spingersi fin l\xEC in sicurezza, n\xE9 ha la connessione mente-muscolo per farlo bene. Serve una base di almeno 6-12 mesi di allenamento strutturato.",how:"Se ti alleni da tempo e sai cosa significa 'non riuscire a completare un'altra ripetizione in forma corretta', sei nel target. Altrimenti, costruisci prima una base con un approccio pi\xF9 classico."},{key:"frequenza",title:"Frequenza Flessibile",tag:"Non a giorni fissi",color:"blue",what:"Non ti alleni a giorni fissi del calendario (es. 'luned\xEC petto'), ma in base al recupero effettivo di ogni gruppo muscolare.",why:"Il muscolo cresce durante il riposo, non durante l'allenamento. Riallenare un gruppo prima che sia recuperato interrompe la supercompensazione e porta al sovrallenamento. Persone diverse (e momenti diversi) recuperano a velocit\xE0 diverse.",how:"Il segnale oggettivo \xE8 il carico: se il peso che sollevavi non scende, sei recuperato e puoi riallenare quel gruppo; se scende o ti senti svuotato, aspetta un giorno in pi\xF9. Ascolta anche sonno, energia e articolazioni (vedi il check Prontezza)."},{key:"recupero",title:"Recupero Post-Seduta",tag:"Per lo stesso gruppo muscolare",color:"green",what:"I giorni indicati (es. 2-3 giorni) sono il tempo minimo prima di riallenare LO STESSO gruppo muscolare \u2014 cio\xE8 prima di rifare QUEL workout, non un altro.",why:"Ogni workout colpisce muscoli diversi (A: petto/schiena/addome, B: gambe, C: spalle/braccia). Mentre il gruppo di A recupera, puoi allenare B e C: sono muscoli diversi, non c'\xE8 conflitto.",how:"Puoi fare A il giorno 1, B il giorno 2, C il giorno 3, e poi ripartire da A quando \xE8 passato il suo recupero. Il recupero conta PER MUSCOLO, non blocca il calendario. Unica eccezione: dopo le gambe (specie col doppio giro) servono pi\xF9 giorni prima di rifare LE GAMBE, ma puoi comunque allenare la parte alta nel frattempo."},{key:"durata",title:"Durata Stimata",tag:"Tempo indicativo della seduta",color:"gray",what:"Una stima del tempo totale della seduta, calcolata dai tempi sotto tensione (TUT) di ogni esercizio + i recuperi realistici + riscaldamento e ramping.",why:"Serve a pianificare: il HIT \xE8 nato per essere efficiente. Se una seduta dura molto pi\xF9 del previsto, probabilmente stai recuperando troppo tra gli esercizi o aggiungendo volume non previsto.",how:"\xC8 un intervallo (min-max) perch\xE9 il ritmo di esecuzione e i transiti variano. Il tempo-macchina pu\xF2 essere breve anche quando la fatica \xE8 altissima (es. il giant set gambe): durata corta non significa seduta facile."},{key:"ct",title:"CT \u2014 Carico Target",tag:"Non \xE8 il tuo 1RM",color:"red",what:"Il peso pi\xF9 pesante con cui raggiungi il cedimento entro il range di ripetizioni previsto (es. 8), rispettando la cadenza lenta indicata.",why:"Il 100% della scheda NON \xE8 il massimale a 1 ripetizione (1RM). Il vero 1RM non va mai testato in questo protocollo: la cadenza lenta cambia la curva di forza e un test massimale comporta un rischio articolare sproporzionato.",how:"Si trova per approssimazioni successive nelle prime 1-2 sedute per esercizio: se il cedimento arriva oltre il range, aumenta il carico del 10-15% alla seduta dopo; se arriva prima, riducilo del 10-15%. Usa il tab 'Trova CT'."},{key:"rom",title:"ROM \u2014 Range of Movement",tag:"Escursione articolare",color:"sky",what:"L'ampiezza del movimento eseguito nell'esercizio. 'Completo' significa dalla massima estensione alla massima contrazione muscolare.",why:"Il ROM completo \xE8 richiesto nella fase di ramping/pre-attivazione per stimolare l'intera fibra muscolare. Le riduzioni di ROM (parziali, Zone Training) sono tecniche di intensificazione, applicate solo DOPO il cedimento a ROM completo \u2014 mai al posto di esso.",how:"Rispetta sempre il ROM indicato per l'esercizio. Se non riesci a completarlo con forma corretta, il carico \xE8 troppo alto."},{key:"tut",title:"TUT \u2014 Time Under Tension",tag:"Tempo sotto tensione",color:"amber",what:"Il tempo totale in cui il muscolo resta sotto carico durante una serie: cadenza (secondi per ripetizione) \xD7 numero di ripetizioni.",why:"Le target set dei grandi gruppi muscolari dovrebbero ricadere nella fascia di TUT intermedio (30-70 secondi), la finestra ottimale per l'ipertrofia miofibrillare. Dove il TUT supera i 70s per scelta (polpacci, curl con isometria), \xE8 intenzionale.",how:"Se il TUT stimato \xE8 molto pi\xF9 corto del previsto, probabilmente stai muovendo il peso pi\xF9 veloce della cadenza richiesta."},{key:"cadenza",title:"Cadenza (4 numeri)",tag:"Eccentrica\u2013Iso.bassa\u2013Concentrica\u2013Iso.alta",color:"indigo",what:"Quattro numeri in secondi, in quest'ordine: Eccentrica (discesa) \u2013 Isometria inferiore (pausa in massimo stiramento) \u2013 Concentrica (risalita) \u2013 Isometria superiore (pausa in massima contrazione). Es. 4-0-4-0 = 4s discesa, 0s pausa bassa, 4s salita, 0s pausa alta.",why:"La velocit\xE0 di esecuzione determina lo stimolo meccanico: rallentare elimina l'inerzia e obbliga le fibre contrattili a farsi carico dell'intero movimento, anzich\xE9 scaricare il lavoro su tendini e legamenti.",how:"Usa il Metronomo Cadenza nella scheda per rispettare esattamente i tempi prescritti \u2014 \xE8 la variabile pi\xF9 spesso ignorata e pi\xF9 determinante del protocollo."},{key:"cedimento",title:"Cedimento (vero)",tag:"L'obiettivo di ogni Target Set",color:"red",what:"Il punto in cui, rispettando forma e cadenza corrette, \xE8 fisicamente impossibile completare un'altra ripetizione.",why:"\xC8 l'intensit\xE0 estrema del cedimento concentrico \u2014 non il volume di serie \u2014 a stimolare l'ipertrofia in questo metodo. Fermarsi prima per timore vanifica la target set.",how:"Non fermarti alla fatica percepita: continua fino a che il movimento si blocca a met\xE0 corsa mantenendo la cadenza indicata."},{key:"brzycki",title:"1RM Stimato (Formula di Brzycki)",tag:"Solo un riferimento numerico",color:"gray",what:"1RM stimato = peso sollevato \xF7 (1,0278 \u2212 0,0278 \xD7 ripetizioni a cedimento). Es. 60kg per 8 rep \u2192 1RM stimato \u2248 74kg.",why:"Utile solo come ordine di grandezza per confronto con altri metodi. La formula \xE8 tarata su movimenti esplosivi standard: con la cadenza lenta d
